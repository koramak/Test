    const workoutData3Day = {

      day3: { name: "Lower Volume + Core Finisher", focus: "Glute pump, quad balance, ab definition", exercises: [

        { id: "leg_curl", name: "Leg Curl", sets: 3, reps: "8-12", defaultWeight: 70, muscles: ["hamstrings"], notes: "Control negative", superset: true },
        { id: "leg_ext", name: "Leg Extension", sets: 3, reps: "10-12", defaultWeight: 80, muscles: ["quads"], notes: "Controlled reps for knee health" },
        { id: "single_leg_rdl", name: "Single-Leg RDL", sets: 3, reps: "10-12", defaultWeight: 25, muscles: ["glutes", "hamstrings"], notes: "Balance first, then load" },
        { id: "push_ups", name: "Push-ups", sets: 3, reps: "12-20", defaultWeight: 0, muscles: ["chest", "triceps"], notes: "Upper maintenance", superset: true },
        { id: "face_pull", name: "Face Pulls", sets: 3, reps: "15-20", defaultWeight: 35, muscles: ["rearDelts", "traps"], notes: "Shoulder health > ego" },
        { id: "reverse_crunch", name: "Reverse Crunch", sets: 3, reps: "12-20", defaultWeight: 0, muscles: ["abs"], notes: "Progress via decline/ankle weight" },
        { id: "pallof_press", name: "Pallof Press", sets: 3, reps: "10-15", defaultWeight: 30, muscles: ["abs"], notes: "Anti-rotation" },
        { id: "calf_raise", name: "Calf Raises", sets: 3, reps: "12-20", defaultWeight: 120, muscles: ["calves"], notes: "Full ROM, patient progression" }
      ]}
    };

    const programConfigs = {
      '4day': { name: "Strongman Hypertrophy", subtitle: "4-Day Power + Armor", data: workoutData4Day, dayCount: 4, icon: Dumbbell, gradient: 'linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%)', bgGradient: 'linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%)', dayAccents: { day1: '#3b82f6', day2: '#10b981', day3: '#8b5cf6', day4: '#f97316' } },
      '3day': { name: "Peach Protocol", subtitle: "3-Day Glute & Core Sculpt", data: workoutData3Day, dayCount: 3, icon: Sparkles, gradient: 'linear-gradient(135deg, #f472b6 0%, #fb923c 100%)', bgGradient: 'linear-gradient(180deg, #0f0a0d 0%, #1a0f14 100%)', dayAccents: { day1: '#f472b6', day2: '#fb7185', day3: '#fb923c' } }
    };

    // Main App
    function WorkoutApp() {
      const [view, setView] = useState('programSelect');
      const [selectedProgram, setSelectedProgram] = useState(null);
      const [selectedDay, setSelectedDay] = useState(null);
      const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
      const [workoutLog, setWorkoutLog] = useState(() => { try { return JSON.parse(localStorage.getItem('workoutLogV2')) || {}; } catch { return {}; } });

      // Session state - only saved at workout completion
      const [sessionData, setSessionData] = useState({});
      const [workoutStartTime, setWorkoutStartTime] = useState(null);
      const [exerciseStartTime, setExerciseStartTime] = useState(null);
      const [workoutElapsed, setWorkoutElapsed] = useState(0);
      const [showRestTimer, setShowRestTimer] = useState(false);
      const [restDuration, setRestDuration] = useState(90);
      const [showNotes, setShowNotes] = useState(false);
      const [useAltExercise, setUseAltExercise] = useState({});

      useEffect(() => { try { localStorage.setItem('workoutLogV2', JSON.stringify(workoutLog)); } catch {} }, [workoutLog]);

      // Workout timer
      useEffect(() => {
        if (!workoutStartTime) return;
        const interval = setInterval(() => {
          setWorkoutElapsed(Math.floor((Date.now() - workoutStartTime) / 1000));
        }, 1000);
        return () => clearInterval(interval);
      }, [workoutStartTime]);

      const getLogKey = (program, day) => `${program}_${day}`;
      const getExerciseLog = (exerciseId, program, day) => {
        const key = getLogKey(program, day);
        return workoutLog[key]?.exercises?.[exerciseId] || [];
      };
      const getLastSession = (exerciseId) => {
        if (!selectedProgram || !selectedDay) return null;
        const logs = getExerciseLog(exerciseId, selectedProgram, selectedDay);
        return logs.length > 0 ? logs[logs.length - 1] : null;
      };

      const calculateProgression = (exercise) => {
        const lastData = getLastSession(exercise.id);
        const config = progressionConfig[exercise.id] || defaultProgressionConfig;
        if (!lastData) return { weight: exercise.defaultWeight, suggestion: null, action: 'start', icon: null, config };
        const result = config.progressionLogic(lastData);
        const lastWeight = lastData.weight;
        let newWeight = lastWeight, icon = Minus;
        if (result.action === 'increase') { newWeight = lastWeight + (result.amount || config.weightIncrement); icon = TrendingUp; }
        else if (result.action === 'decrease') { newWeight = Math.max(0, lastWeight - (result.amount || config.weightIncrement)); icon = TrendingDown; }
        else if (result.action === 'progress') icon = TrendingUp;
        else if (result.action === 'regress') icon = TrendingDown;
        return { weight: newWeight, suggestion: result.reason, action: result.action, icon, config, lastWeight, lastSession: lastData };
      };

      const selectProgram = (program) => { setSelectedProgram(program); setView('home'); };
      const startDay = (day) => { setSelectedDay(day); setView('dayOverview'); };

      const beginWorkout = () => {
        setWorkoutStartTime(Date.now());
        setSessionData({});
        setUseAltExercise({});
        startExercise(0);
      };

      const startExercise = (index) => {
        // Save current exercise time if coming from another exercise
        if (exerciseStartTime && sessionData[currentExerciseIndex]) {
          const timeSpent = Math.floor((Date.now() - exerciseStartTime) / 1000);
          setSessionData(prev => ({
            ...prev,
            [currentExerciseIndex]: { ...prev[currentExerciseIndex], timeSpent }
          }));
        }

        setCurrentExerciseIndex(index);
        setExerciseStartTime(Date.now());
        setShowNotes(false);

        const config = programConfigs[selectedProgram];
        const exercise = config.data[selectedDay].exercises[index];

        // Initialize session data for this exercise if not exists
        if (!sessionData[index]) {
          const progression = calculateProgression(exercise);
          const exerciseConfig = progressionConfig[exercise.id] || defaultProgressionConfig;
          const targetReps = exerciseConfig.repRange[1];
          const numSets = typeof exercise.sets === 'number' ? exercise.sets : 3;

          setSessionData(prev => ({
            ...prev,
            [index]: {
              sets: Array(numSets).fill(null).map(() => ({ weight: progression.weight, reps: targetReps, completed: false })),
              notes: '',
              selectedAbExercise: exercise.isAbsSlot ? 'cable_crunch' : null,
              timeSpent: 0
            }
          }));
        }

        setView('exercise');
      };

      const updateSet = (setIndex, field, value) => {
        setSessionData(prev => ({
          ...prev,
          [currentExerciseIndex]: {
            ...prev[currentExerciseIndex],
            sets: prev[currentExerciseIndex].sets.map((s, i) =>
              i === setIndex ? { ...s, [field]: value } : s
            )
          }
        }));
      };

      const toggleSetComplete = (setIndex) => {
        const currentSets = sessionData[currentExerciseIndex]?.sets || [];
        const wasCompleted = currentSets[setIndex]?.completed;

        setSessionData(prev => ({
          ...prev,
          [currentExerciseIndex]: {
            ...prev[currentExerciseIndex],
            sets: prev[currentExerciseIndex].sets.map((s, i) =>
              i === setIndex ? { ...s, completed: !s.completed } : s
            )
          }
        }));

        // Start rest timer if marking complete (not uncompleting)
        if (!wasCompleted) {
          const config = programConfigs[selectedProgram];
          const exercise = config.data[selectedDay].exercises[currentExerciseIndex];
          const exerciseConfig = progressionConfig[exercise.id] || defaultProgressionConfig;
          setRestDuration(exerciseConfig.restTime || 90);
          setShowRestTimer(true);
        }
      };

      const updateNotes = (notes) => {
        setSessionData(prev => ({
          ...prev,
          [currentExerciseIndex]: { ...prev[currentExerciseIndex], notes }
        }));
      };

      const updateAbExercise = (abExerciseId) => {
        setSessionData(prev => ({
          ...prev,
          [currentExerciseIndex]: { ...prev[currentExerciseIndex], selectedAbExercise: abExerciseId }
        }));
      };

      const toggleAltExercise = () => {
        setUseAltExercise(prev => ({
          ...prev,
          [currentExerciseIndex]: !prev[currentExerciseIndex]
        }));
      };

      const nextExercise = () => {
        const config = programConfigs[selectedProgram];
        const exercises = config.data[selectedDay].exercises;

        // Save time for current exercise
        if (exerciseStartTime) {
          const timeSpent = Math.floor((Date.now() - exerciseStartTime) / 1000);
          setSessionData(prev => ({
            ...prev,
            [currentExerciseIndex]: { ...prev[currentExerciseIndex], timeSpent }
          }));
        }

        if (currentExerciseIndex < exercises.length - 1) {
          startExercise(currentExerciseIndex + 1);
        } else {
          setView('summary');
        }
      };

      const prevExercise = () => {
        if (currentExerciseIndex > 0) {
          startExercise(currentExerciseIndex - 1);
        }
      };

      const completeWorkout = () => {
        const config = programConfigs[selectedProgram];
        const exercises = config.data[selectedDay].exercises;
        const totalTime = Math.floor((Date.now() - workoutStartTime) / 1000);
        const key = getLogKey(selectedProgram, selectedDay);

        // Build the workout session record
        const workoutSession = {
          date: new Date().toISOString(),
          totalTime,
          exercises: {}
        };

        // Process each exercise
        exercises.forEach((exercise, index) => {
          const data = sessionData[index];
          if (!data) return;

          const exerciseId = exercise.isAbsSlot ? data.selectedAbExercise : exercise.id;
          const nameParts = exercise.name.split(' / ');
          const usedAlt = useAltExercise[index] && nameParts.length > 1;
          const exerciseName = usedAlt ? nameParts[1] : nameParts[0];

          if (!workoutSession.exercises[exerciseId]) {
            workoutSession.exercises[exerciseId] = [];
          }

          workoutSession.exercises[exerciseId].push({
            exerciseName,
            usedAlt,
            sets: data.sets,
            weight: data.sets[0]?.weight || 0,
            notes: data.notes,
            timeSpent: data.timeSpent
          });
        });

        // Update log
        setWorkoutLog(prev => {
          const existing = prev[key] || { sessions: [], exercises: {} };

          // Add to sessions array
          const sessions = [...(existing.sessions || []), { date: workoutSession.date, totalTime }];

          // Merge exercise data
          const exercisesLog = { ...existing.exercises };
          Object.entries(workoutSession.exercises).forEach(([exId, entries]) => {
            if (!exercisesLog[exId]) exercisesLog[exId] = [];
            entries.forEach(entry => {
              exercisesLog[exId].push({
                date: workoutSession.date,
                ...entry
              });
            });
          });

          return { ...prev, [key]: { sessions, exercises: exercisesLog } };
        });

        setView('complete');
      };

      const resetData = () => {
        if (confirm('Clear all workout history?')) {
          setWorkoutLog({});
          localStorage.removeItem('workoutLogV2');
        }
      };

      const exportCSV = () => {
        let csv = 'Date,Program,Day,Exercise,Variant,Set,Weight,Reps,Completed,Notes,Time Spent (sec),Workout Duration (sec)\n';

        Object.entries(workoutLog).forEach(([key, data]) => {
          const [program, day] = key.split('_');
          const sessions = data.sessions || [];

          Object.entries(data.exercises || {}).forEach(([exerciseId, entries]) => {
            entries.forEach(entry => {
              const session = sessions.find(s => s.date === entry.date);
              entry.sets.forEach((set, setIndex) => {
                csv += `${new Date(entry.date).toLocaleDateString()},${program},${day},${entry.exerciseName || exerciseId},${entry.usedAlt ? 'Alt' : 'Main'},${setIndex + 1},${set.weight},${set.reps},${set.completed ? 'Yes' : 'No'},"${entry.notes || ''}",${entry.timeSpent || ''},${session?.totalTime || ''}\n`;
              });
            });
          });
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `workout_export_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
      };

      // PROGRAM SELECT
      if (view === 'programSelect') {
        return (
          <div className="min-h-screen text-white p-4 flex items-center justify-center" style={{ background: 'linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%)' }}>
            <div className="max-w-md mx-auto w-full">
              <div className="text-center mb-10">
                <h1 className="text-2xl font-bold tracking-tight mb-2">Choose Your Program</h1>
                <p className="text-zinc-500 text-sm">Select a workout plan to get started</p>
              </div>
              <div className="space-y-4">
                {Object.entries(programConfigs).map(([key, cfg]) => (
                  <button key={key} onClick={() => selectProgram(key)} className="w-full rounded-2xl p-5 text-left transition-all active:scale-[0.98] border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: cfg.gradient }}><cfg.icon className="w-6 h-6 text-white" /></div>
                      <div className="flex-1">
                        <div className="text-base font-semibold text-zinc-100">{cfg.name}</div>
                        <div className="text-xs text-zinc-500">{cfg.subtitle}</div>
                      </div>
                      <ChevronRight className="w-5 h-5 text-zinc-600" />
                    </div>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const config = programConfigs[selectedProgram];
      const workoutData = config?.data;

      // HOME
      if (view === 'home') {
        return (
          <div className="min-h-screen text-white p-4" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto">
              <div className="text-center mb-8 pt-4">
                <button onClick={() => setView('programSelect')} className="text-zinc-600 text-xs mb-3 hover:text-white transition-colors flex items-center justify-center gap-1 mx-auto"><ChevronLeft className="w-3 h-3" /> Switch</button>
                <div className="w-14 h-14 mx-auto mb-3 rounded-xl flex items-center justify-center" style={{ background: config.gradient }}><config.icon className="w-7 h-7 text-white" /></div>
                <h1 className="text-xl font-bold tracking-tight">{config.name}</h1>
                <p className="text-zinc-500 text-xs mt-1">{config.subtitle}</p>
              </div>
              <div className="space-y-2">
                {Object.entries(workoutData).map(([day, data]) => {
                  const accent = config.dayAccents[day];
                  return (
                    <button key={day} onClick={() => startDay(day)} className="w-full rounded-xl p-4 text-left transition-all active:scale-[0.98] border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                      <div className="flex justify-between items-center">
                        <div>
                          <div className="text-[9px] font-semibold uppercase tracking-widest mb-0.5" style={{ color: accent }}>Day {day.replace('day','')}</div>
                          <div className="text-sm font-semibold text-zinc-100">{data.name}</div>
                          <div className="text-[10px] text-zinc-600">{data.exercises.length} exercises</div>
                        </div>
                        <ChevronRight className="w-4 h-4" style={{ color: accent }} />
                      </div>
                    </button>
                  );
                })}
              </div>
              <div className="mt-8 flex gap-2 text-[10px]">
                <button onClick={exportCSV} className="flex-1 text-zinc-600 flex items-center justify-center gap-1 py-2 border border-zinc-800 rounded-lg"><Download className="w-3 h-3" /> Export</button>
                <button onClick={resetData} className="flex-1 text-zinc-700 flex items-center justify-center gap-1 py-2"><RotateCcw className="w-3 h-3" /> Reset</button>
              </div>
            </div>
          </div>
        );
      }

      // DAY OVERVIEW
      if (view === 'dayOverview') {
        const dayData = workoutData[selectedDay];
        const accent = config.dayAccents[selectedDay];
        return (
          <div className="min-h-screen text-white p-4 pb-24" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto">
              <button onClick={() => setView('home')} className="flex items-center text-zinc-500 mb-4 text-sm"><ChevronLeft className="w-4 h-4" /> Back</button>
              <div className="mb-4">
                <div className="text-[9px] font-semibold uppercase tracking-widest mb-0.5" style={{ color: accent }}>Day {selectedDay.replace('day','')}</div>
                <h1 className="text-lg font-bold text-zinc-100">{dayData.name}</h1>
                <p className="text-zinc-500 text-xs">{dayData.focus}</p>
              </div>
              <div className="space-y-1.5 mb-4">
                {dayData.exercises.map((ex, i) => {
                  const lastData = getLastSession(ex.id);
                  const primaryColor = muscleColors[ex.muscles[0]] || '#6b7280';
                  return (
                    <div key={`${ex.id}-${i}`} className="rounded-lg p-3 flex items-center gap-2.5 border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                      <div className="w-7 h-7 rounded flex items-center justify-center text-xs font-bold" style={{ background: `${primaryColor}20`, color: primaryColor }}>{i + 1}</div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-zinc-200 truncate">{ex.name.split(' / ')[0]}</div>
                        <div className="text-[10px] text-zinc-600">{ex.sets} × {ex.reps}{lastData ? ` · ${lastData.weight} lbs` : ''}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="fixed bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-zinc-950 to-transparent">
                <div className="max-w-md mx-auto">
                  <button onClick={beginWorkout} className="w-full text-white font-semibold py-3.5 rounded-xl text-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2" style={{ background: accent }}>
                    <Play className="w-4 h-4" /> Begin Workout
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // EXERCISE
      if (view === 'exercise') {
        const dayData = workoutData[selectedDay];
        const exercise = dayData.exercises[currentExerciseIndex];
        const progression = calculateProgression(exercise);
        const exerciseConfig = progressionConfig[exercise.id] || defaultProgressionConfig;
        const accent = config.dayAccents[selectedDay];
        const weightIncrement = exerciseConfig.weightIncrement || 5;
        const nameParts = exercise.name.split(' / ');
        const hasAlt = nameParts.length > 1;
        const isUsingAlt = useAltExercise[currentExerciseIndex];
        const displayName = isUsingAlt && hasAlt ? nameParts[1] : nameParts[0];
        const currentData = sessionData[currentExerciseIndex] || { sets: [], notes: '', selectedAbExercise: 'cable_crunch' };

        let suggestionColor = accent, suggestionBg = `${accent}15`;
        if (progression.action === 'increase' || progression.action === 'progress') { suggestionColor = '#10b981'; suggestionBg = '#10b98115'; }
        else if (progression.action === 'decrease' || progression.action === 'regress') { suggestionColor = '#f59e0b'; suggestionBg = '#f59e0b15'; }

        const StepBtn = ({ onClick, children }) => (
          <button onClick={onClick} className="w-11 h-11 rounded-lg flex items-center justify-center text-lg font-bold transition-all active:scale-90" style={{ background: `${accent}20`, color: accent }}>{children}</button>
        );

        return (
          <div className="min-h-screen text-white p-3 pb-24" style={{ background: config.bgGradient }}>
            {showRestTimer && (
              <RestTimer
                duration={restDuration}
                onComplete={() => setShowRestTimer(false)}
                accent={accent}
              />
            )}

            <div className="max-w-md mx-auto">
              {/* Header with timer */}
              <div className="flex justify-between items-center mb-2">
                <button onClick={() => setView('dayOverview')} className="text-zinc-500 p-1"><ChevronLeft className="w-5 h-5" /></button>
                <div className="flex items-center gap-2">
                  <div className="text-[10px] text-zinc-600">{currentExerciseIndex + 1}/{dayData.exercises.length}</div>
                  {workoutStartTime && (
                    <div className="flex items-center gap-1 text-[10px] text-zinc-500">
                      <Clock className="w-3 h-3" />
                      {formatTime(workoutElapsed)}
                    </div>
                  )}
                </div>
                <button onClick={() => setShowNotes(!showNotes)} className="text-zinc-500 p-1">
                  <StickyNote className="w-5 h-5" />
                </button>
              </div>

              {/* Progress bar */}
              <div className="h-0.5 bg-zinc-800 rounded-full mb-3 overflow-hidden">
                <div className="h-full rounded-full" style={{ width: `${((currentExerciseIndex + 1) / dayData.exercises.length) * 100}%`, background: accent }} />
              </div>

              {/* Alt exercise toggle */}
              {hasAlt && (
                <button
                  onClick={toggleAltExercise}
                  className="w-full mb-2 py-2 px-3 rounded-lg flex items-center justify-between text-sm border transition-all"
                  style={{
                    borderColor: isUsingAlt ? accent : '#27272a',
                    background: isUsingAlt ? `${accent}15` : 'transparent'
                  }}
                >
                  <span className="text-zinc-400 text-xs">
                    {isUsingAlt ? 'Using:' : 'Main:'}
                  </span>
                  <span className="font-medium" style={{ color: isUsingAlt ? accent : '#fff' }}>
                    {displayName}
                  </span>
                  <Swap className="w-4 h-4" style={{ color: accent }} />
                </button>
              )}

              {/* Exercise name */}
              {!hasAlt && <h1 className="text-base font-bold text-zinc-100 mb-0.5">{displayName}</h1>}
              <p className="text-zinc-500 text-[10px] mb-2">{exercise.notes}</p>

              {/* Abs dropdown */}
              {exercise.isAbsSlot && (
                <div className="mb-3">
                  <div className="relative">
                    <select
                      value={currentData.selectedAbExercise || 'cable_crunch'}
                      onChange={(e) => updateAbExercise(e.target.value)}
                      className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white appearance-none"
                    >
                      {abExerciseOptions.map(opt => (
                        <option key={opt.id} value={opt.id}>{opt.name}</option>
                      ))}
                    </select>
                    <ChevronDown className="w-4 h-4 text-zinc-500 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                  </div>
                </div>
              )}

              {/* Exercise image/animation */}
              <ExerciseImage exerciseId={exercise.isAbsSlot ? currentData.selectedAbExercise : exercise.id} accent={accent} />

              {/* Last session performance */}
              {progression.lastSession && (
                <div className="mt-2 p-2 rounded-lg bg-zinc-900/50 border border-zinc-800/50">
                  <div className="text-[9px] text-zinc-500 mb-1">Last session:</div>
                  <div className="flex gap-2 flex-wrap">
                    {progression.lastSession.sets.map((s, i) => (
                      <span key={i} className="text-[10px] text-zinc-400">
                        {s.weight}×{s.reps}{s.completed ? '✓' : ''}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {/* Progression suggestion */}
              {progression.suggestion && (
                <div className="rounded-lg px-2 py-1.5 text-[10px] mt-2 flex items-center gap-2" style={{ background: suggestionBg, color: suggestionColor }}>
                  {progression.icon && <progression.icon className="w-3 h-3" />}
                  <span>{progression.suggestion}</span>
                </div>
              )}

              {/* Notes field */}
              {showNotes && (
                <div className="mt-2">
                  <textarea
                    value={currentData.notes || ''}
                    onChange={(e) => updateNotes(e.target.value)}
                    placeholder="Add notes..."
                    className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white"
                    rows={2}
                  />
                </div>
              )}

              {/* Sets */}
              <div className="space-y-2 mt-3">
                {currentData.sets.map((set, i) => (
                  <div key={i} className={`rounded-lg p-2 border ${set.completed ? 'border-emerald-500/50 bg-emerald-500/10' : 'border-zinc-800/50 bg-zinc-900/30'}`}>
                    <div className="flex items-center gap-2">
                      <button onClick={() => toggleSetComplete(i)} className={`w-6 h-6 rounded flex items-center justify-center transition-all active:scale-90 flex-shrink-0 text-[10px] font-bold ${set.completed ? 'bg-emerald-500 text-white' : 'bg-zinc-800 text-zinc-500'}`}>
                        {set.completed ? <Check className="w-3.5 h-3.5" /> : i + 1}
                      </button>
                      <div className="flex items-center gap-1 flex-1">
                        <StepBtn onClick={() => updateSet(i, 'weight', Math.max(0, set.weight - weightIncrement))}>−</StepBtn>
                        <div className="flex-1 text-center"><div className="text-base font-bold text-zinc-100">{set.weight}</div><div className="text-[7px] text-zinc-600 -mt-0.5">lbs</div></div>
                        <StepBtn onClick={() => updateSet(i, 'weight', set.weight + weightIncrement)}>+</StepBtn>
                      </div>
                      <div className="w-px h-6 bg-zinc-800" />
                      <div className="flex items-center gap-1 flex-1">
                        <StepBtn onClick={() => updateSet(i, 'reps', Math.max(1, set.reps - 1))}>−</StepBtn>
                        <div className="flex-1 text-center"><div className="text-base font-bold text-zinc-100">{set.reps}</div><div className="text-[7px] text-zinc-600 -mt-0.5">reps</div></div>
                        <StepBtn onClick={() => updateSet(i, 'reps', set.reps + 1)}>+</StepBtn>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Navigation - BIGGER buttons */}
              <div className="fixed bottom-4 left-0 right-0 pointer-events-none">
                <div className="max-w-md mx-auto px-4 flex justify-between">
                  <button
                    onClick={prevExercise}
                    disabled={currentExerciseIndex === 0}
                    className="pointer-events-auto w-16 h-16 rounded-xl flex items-center justify-center text-4xl text-zinc-600 disabled:opacity-20 active:scale-90 bg-zinc-900/80 border border-zinc-800"
                  >
                    ‹
                  </button>
                  <button
                    onClick={nextExercise}
                    className="pointer-events-auto w-16 h-16 rounded-xl flex items-center justify-center text-4xl active:scale-90 border"
                    style={{ color: accent, background: `${accent}15`, borderColor: accent }}
                  >
                    ›
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // SUMMARY (before final completion)
      if (view === 'summary') {
        const dayData = workoutData[selectedDay];
        const accent = config.dayAccents[selectedDay];
        const totalTime = workoutStartTime ? Math.floor((Date.now() - workoutStartTime) / 1000) : 0;

        return (
          <div className="min-h-screen text-white p-4 pb-24" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto">
              <h1 className="text-lg font-bold text-zinc-100 mb-1">Workout Summary</h1>
              <p className="text-zinc-500 text-sm mb-4">{dayData.name}</p>

              <div className="p-4 rounded-xl bg-zinc-900/50 border border-zinc-800 mb-4">
                <div className="text-center">
                  <div className="text-3xl font-bold" style={{ color: accent }}>{formatTime(totalTime)}</div>
                  <div className="text-zinc-500 text-xs">Total Duration</div>
                </div>
              </div>

              <div className="space-y-2 mb-4">
                {dayData.exercises.map((ex, i) => {
                  const data = sessionData[i];
                  if (!data) return null;
                  const completedSets = data.sets.filter(s => s.completed).length;
                  const nameParts = ex.name.split(' / ');
                  const usedAlt = useAltExercise[i] && nameParts.length > 1;
                  const displayName = usedAlt ? nameParts[1] : nameParts[0];

                  return (
                    <div key={i} className="rounded-lg p-3 border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                      <div className="flex justify-between items-center">
                        <div>
                          <div className="text-sm font-medium text-zinc-200">{displayName}</div>
                          <div className="text-[10px] text-zinc-500">
                            {completedSets}/{data.sets.length} sets · {data.sets[0]?.weight || 0} lbs
                            {data.timeSpent ? ` · ${formatTime(data.timeSpent)}` : ''}
                          </div>
                        </div>
                        {completedSets === data.sets.length ? (
                          <Check className="w-4 h-4 text-emerald-500" />
                        ) : (
                          <span className="text-[10px] text-amber-500">{completedSets}/{data.sets.length}</span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="fixed bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-zinc-950 to-transparent">
                <div className="max-w-md mx-auto space-y-2">
                  <button
                    onClick={completeWorkout}
                    className="w-full text-white font-semibold py-3.5 rounded-xl text-sm transition-all active:scale-[0.98]"
                    style={{ background: accent }}
                  >
                    Complete Workout
                  </button>
                  <button
                    onClick={() => startExercise(0)}
                    className="w-full text-zinc-400 font-medium py-2 text-sm"
                  >
                    Review Exercises
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // COMPLETE
      if (view === 'complete') {
        const dayData = workoutData[selectedDay];
        const accent = config.dayAccents[selectedDay];
        const key = getLogKey(selectedProgram, selectedDay);
        const lastSession = workoutLog[key]?.sessions?.slice(-1)[0];

        return (
          <div className="min-h-screen text-white p-4 flex items-center justify-center" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto text-center">
              <div className="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-6" style={{ background: accent }}>
                <Trophy className="w-9 h-9 text-white" />
              </div>
              <h1 className="text-xl font-bold text-zinc-100 mb-1">Workout Complete!</h1>
              <p className="text-zinc-500 text-sm mb-4">{dayData.name}</p>

              {lastSession && (
                <div className="text-3xl font-bold mb-6" style={{ color: accent }}>
                  {formatTime(lastSession.totalTime)}
                </div>
              )}

              <button
                onClick={() => {
                  setView('home');
                  setSelectedDay(null);
                  setWorkoutStartTime(null);
                  setSessionData({});
                }}
                className="w-full text-white font-semibold py-3.5 rounded-xl text-sm"
                style={{ background: accent }}
              >
                Done
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutApp />);
  </script>
</body>
</html>
