    const workoutData3Day = {

        { id: "deadlift", name: "Sumo / Conventional Deadlift", sets: 4, reps: "4-6", defaultWeight: 185, muscles: ["glutes", "hamstrings", "lats", "traps"], notes: "Heavy, 2-3 min rest" },
        { id: "hip_thrust", name: "Barbell Hip Thrust", sets: 4, reps: "5-8", defaultWeight: 135, muscles: ["glutes", "hamstrings"], notes: "Progress fast - squeeze at top" },
        { id: "db_bench", name: "DB Bench Press", sets: 3, reps: "8-12", defaultWeight: 35, muscles: ["chest", "triceps"], notes: "Upper maintenance", superset: true },
        { id: "cable_row", name: "Cable Row", sets: 3, reps: "10-12", defaultWeight: 100, muscles: ["lats", "traps", "biceps"], notes: "Upper maintenance" },
        { id: "bulgarian_split", name: "Bulgarian Split Squat", sets: 3, reps: "8-12", defaultWeight: 30, muscles: ["glutes", "quads"], notes: "Balance before load" },
        { id: "side_plank_abduction", name: "Side Plank Hip Abduction", sets: 2, reps: "8-12", defaultWeight: 0, muscles: ["glutes", "abs"], notes: "103% glute medius activation" },
        { id: "cable_crunch", name: "Cable Crunch", sets: 3, reps: "12-15", defaultWeight: 70, muscles: ["abs"], notes: "Load-based ab work" }
      ]},
      day2: { name: "Full Body Hypertrophy + Core", focus: "Glute volume, unilateral work, ab priority", exercises: [
        { id: "rdl", name: "Romanian Deadlift", sets: 4, reps: "10-12", defaultWeight: 95, muscles: ["hamstrings", "glutes"], notes: "Form > load, feel stretch" },
        { id: "walking_lunge", name: "Walking Lunges", sets: 3, reps: "24-30 steps", defaultWeight: 25, muscles: ["glutes", "quads"], notes: "Per DB, metabolic stress" },
        { id: "step_up", name: "Diagonal Step-Up", sets: 3, reps: "10-12", defaultWeight: 20, muscles: ["glutes", "quads"], notes: "Highest glute EMG activation" },
        { id: "log_press", name: "Log Press / Standing DB Press", sets: 3, reps: "3-5", defaultWeight: 70, muscles: ["shoulders", "triceps"], notes: "Primary press - microplates!" },
        { id: "lat_pulldown", name: "Lat Pulldown", sets: 3, reps: "10-12", defaultWeight: 100, muscles: ["lats", "biceps"], notes: "Upper maintenance", superset: true },
        { id: "hanging_leg_raise", name: "Hanging Leg Raise", sets: 3, reps: "10-15", defaultWeight: 0, muscles: ["abs"], notes: "Progress: bent → straight legs" },
        { id: "cable_kickback", name: "Cable Kickback", sets: 3, reps: "12-15", defaultWeight: 25, muscles: ["glutes"], notes: "Mind-muscle connection" },
        { id: "ab_wheel", name: "Ab Wheel Rollout", sets: 3, reps: "8-15", defaultWeight: 0, muscles: ["abs"], notes: "Highest ab activation - extend ROM" }
      ]},
      day3: { name: "Lower Volume + Core Finisher", focus: "Glute pump, quad balance, ab definition", exercises: [
        { id: "hip_thrust", name: "Hip Thrust (moderate)", sets: 3, reps: "12-15", defaultWeight: 115, muscles: ["glutes"], notes: "Focus on squeeze/contraction" },
        { id: "leg_press", name: "Leg Press (feet high/wide)", sets: 3, reps: "8-12", defaultWeight: 200, muscles: ["glutes", "quads"], notes: "Glute-biased foot position" },
        { id: "leg_curl", name: "Leg Curl", sets: 3, reps: "10-15", defaultWeight: 70, muscles: ["hamstrings"], notes: "Control negative", superset: true },
        { id: "leg_ext", name: "Leg Extension", sets: 3, reps: "12-20", defaultWeight: 80, muscles: ["quads"], notes: "Higher reps for knee health" },
        { id: "single_leg_rdl", name: "Single-Leg RDL", sets: 3, reps: "10-12", defaultWeight: 25, muscles: ["glutes", "hamstrings"], notes: "Balance first, then load" },
        { id: "push_ups", name: "Push-ups", sets: 3, reps: "12-20", defaultWeight: 0, muscles: ["chest", "triceps"], notes: "Upper maintenance", superset: true },
        { id: "face_pull", name: "Face Pulls", sets: 3, reps: "15-20", defaultWeight: 35, muscles: ["rearDelts", "traps"], notes: "Shoulder health > ego" },
        { id: "reverse_crunch", name: "Reverse Crunch", sets: 3, reps: "12-20", defaultWeight: 0, muscles: ["abs"], notes: "Progress via decline/ankle weight" },
        { id: "pallof_press", name: "Pallof Press", sets: 3, reps: "10-15", defaultWeight: 30, muscles: ["abs"], notes: "Anti-rotation" },
        { id: "calf_raise", name: "Calf Raises", sets: 3, reps: "12-20", defaultWeight: 120, muscles: ["calves"], notes: "Full ROM, patient progression" }
      ]}
    };

    const programConfigs = {
      '4day': { name: "Strongman Hypertrophy", subtitle: "4-Day Power + Armor", data: workoutData4Day, dayCount: 4, icon: Dumbbell, gradient: 'linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%)', bgGradient: 'linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%)', dayAccents: { day1: '#3b82f6', day2: '#10b981', day3: '#8b5cf6', day4: '#f97316' } },
      '3day': { name: "Peach Protocol", subtitle: "3-Day Glute & Core Sculpt", data: workoutData3Day, dayCount: 3, icon: Sparkles, gradient: 'linear-gradient(135deg, #f472b6 0%, #fb923c 100%)', bgGradient: 'linear-gradient(180deg, #0f0a0d 0%, #1a0f14 100%)', dayAccents: { day1: '#f472b6', day2: '#fb7185', day3: '#fb923c' } }
    };

    // Main App
    function WorkoutApp() {
      const [view, setView] = useState('programSelect');
      const [selectedProgram, setSelectedProgram] = useState(null);
      const [selectedDay, setSelectedDay] = useState(null);
      const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
      const [workoutLog4Day, setWorkoutLog4Day] = useState(() => { try { return JSON.parse(localStorage.getItem('workoutLog4Day')) || {}; } catch { return {}; } });
      const [workoutLog3Day, setWorkoutLog3Day] = useState(() => { try { return JSON.parse(localStorage.getItem('workoutLog3Day')) || {}; } catch { return {}; } });
      const [currentSets, setCurrentSets] = useState([]);

      useEffect(() => { try { localStorage.setItem('workoutLog4Day', JSON.stringify(workoutLog4Day)); } catch {} }, [workoutLog4Day]);
      useEffect(() => { try { localStorage.setItem('workoutLog3Day', JSON.stringify(workoutLog3Day)); } catch {} }, [workoutLog3Day]);

      const getCurrentLog = () => selectedProgram === '4day' ? workoutLog4Day : workoutLog3Day;
      const setCurrentLog = (newLog) => { if (selectedProgram === '4day') setWorkoutLog4Day(newLog); else setWorkoutLog3Day(newLog); };
      const getLastWeekData = (exerciseId) => { const logs = getCurrentLog()[exerciseId] || []; return logs.length === 0 ? null : logs[logs.length - 1]; };

      const calculateProgression = (exercise) => {
        const lastData = getLastWeekData(exercise.id);
        const config = progressionConfig[exercise.id] || defaultProgressionConfig;
        if (!lastData) return { weight: exercise.defaultWeight, suggestion: null, action: 'start', icon: null, config };
        const result = config.progressionLogic(lastData);
        const lastWeight = lastData.weight;
        let newWeight = lastWeight, icon = Minus;
        if (result.action === 'increase') { newWeight = lastWeight + (result.amount || config.weightIncrement); icon = TrendingUp; }
        else if (result.action === 'decrease') { newWeight = Math.max(0, lastWeight - (result.amount || config.weightIncrement)); icon = TrendingDown; }
        else if (result.action === 'progress') icon = TrendingUp;
        else if (result.action === 'regress') icon = TrendingDown;
        return { weight: newWeight, suggestion: result.reason, action: result.action, icon, config, lastWeight };
      };

      const selectProgram = (program) => { setSelectedProgram(program); setView('home'); };
      const startDay = (day) => { setSelectedDay(day); setView('dayOverview'); };

      const startExercise = (index = 0) => {
        setCurrentExerciseIndex(index);
        const config = programConfigs[selectedProgram];
        const exercise = config.data[selectedDay].exercises[index];
        const progression = calculateProgression(exercise);
        const exerciseConfig = progressionConfig[exercise.id] || defaultProgressionConfig;
        const targetReps = exerciseConfig.repRange[1];
        const numSets = typeof exercise.sets === 'number' ? exercise.sets : 3;
        setCurrentSets(Array(numSets).fill(null).map(() => ({ weight: progression.weight, reps: targetReps, completed: false })));
        setView('exercise');
      };

      const updateSet = (setIndex, field, value) => { const newSets = [...currentSets]; newSets[setIndex] = { ...newSets[setIndex], [field]: value }; setCurrentSets(newSets); };
      const toggleSetComplete = (setIndex) => { const newSets = [...currentSets]; newSets[setIndex] = { ...newSets[setIndex], completed: !newSets[setIndex].completed }; setCurrentSets(newSets); };

      const saveExercise = () => {
        const config = programConfigs[selectedProgram];
        const exercise = config.data[selectedDay].exercises[currentExerciseIndex];
        const newLog = { ...getCurrentLog() };
        if (!newLog[exercise.id]) newLog[exercise.id] = [];
        newLog[exercise.id].push({ date: new Date().toISOString(), day: selectedDay, program: selectedProgram, weight: currentSets[0]?.weight || 0, sets: currentSets });
        setCurrentLog(newLog);
      };

      const nextExercise = () => {
        saveExercise();
        const config = programConfigs[selectedProgram];
        const exercises = config.data[selectedDay].exercises;
        if (currentExerciseIndex < exercises.length - 1) startExercise(currentExerciseIndex + 1);
        else setView('complete');
      };

      const prevExercise = () => { if (currentExerciseIndex > 0) { saveExercise(); startExercise(currentExerciseIndex - 1); } };

      const resetData = () => { if (confirm('Clear all workout history for this program?')) { setCurrentLog({}); } };

      const exportCSV = () => {
        const log = getCurrentLog();
        const config = programConfigs[selectedProgram];
        let csv = 'Date,Day,Exercise,Set,Weight,Reps,Completed\n';
        Object.entries(log).forEach(([exerciseId, entries]) => {
          entries.forEach(entry => {
            entry.sets.forEach((set, setIndex) => {
              let name = exerciseId;
              Object.values(config.data).forEach(day => { const f = day.exercises.find(e => e.id === exerciseId); if (f) name = f.name; });
              csv += `${new Date(entry.date).toLocaleDateString()},Day ${entry.day.replace('day','')},${name},${setIndex+1},${set.weight},${set.reps},${set.completed?'Yes':'No'}\n`;
            });
          });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `workout_${selectedProgram}_${new Date().toISOString().split('T')[0]}.csv`; a.click();
      };

      // PROGRAM SELECT
      if (view === 'programSelect') {
        return (
          <div className="min-h-screen text-white p-4 flex items-center justify-center" style={{ background: 'linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%)' }}>
            <div className="max-w-md mx-auto w-full">
              <div className="text-center mb-10">
                <h1 className="text-2xl font-bold tracking-tight mb-2">Choose Your Program</h1>
                <p className="text-zinc-500 text-sm">Select a workout plan to get started</p>
              </div>
              <div className="space-y-4">
                {Object.entries(programConfigs).map(([key, cfg]) => (
                  <button key={key} onClick={() => selectProgram(key)} className="w-full rounded-2xl p-5 text-left transition-all active:scale-[0.98] border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: cfg.gradient }}><cfg.icon className="w-6 h-6 text-white" /></div>
                      <div className="flex-1">
                        <div className="text-base font-semibold text-zinc-100">{cfg.name}</div>
                        <div className="text-xs text-zinc-500">{cfg.subtitle}</div>
                      </div>
                      <ChevronRight className="w-5 h-5 text-zinc-600" />
                    </div>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const config = programConfigs[selectedProgram];
      const workoutData = config.data;

      // HOME
      if (view === 'home') {
        return (
          <div className="min-h-screen text-white p-4" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto">
              <div className="text-center mb-8 pt-4">
                <button onClick={() => setView('programSelect')} className="text-zinc-600 text-xs mb-3 hover:text-white transition-colors flex items-center justify-center gap-1 mx-auto"><ChevronLeft className="w-3 h-3" /> Switch</button>
                <div className="w-14 h-14 mx-auto mb-3 rounded-xl flex items-center justify-center" style={{ background: config.gradient }}><config.icon className="w-7 h-7 text-white" /></div>
                <h1 className="text-xl font-bold tracking-tight">{config.name}</h1>
                <p className="text-zinc-500 text-xs mt-1">{config.subtitle}</p>
              </div>
              <div className="space-y-2">
                {Object.entries(workoutData).map(([day, data]) => {
                  const accent = config.dayAccents[day];
                  return (
                    <button key={day} onClick={() => startDay(day)} className="w-full rounded-xl p-4 text-left transition-all active:scale-[0.98] border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                      <div className="flex justify-between items-center">
                        <div>
                          <div className="text-[9px] font-semibold uppercase tracking-widest mb-0.5" style={{ color: accent }}>Day {day.replace('day','')}</div>
                          <div className="text-sm font-semibold text-zinc-100">{data.name}</div>
                          <div className="text-[10px] text-zinc-600">{data.exercises.length} exercises</div>
                        </div>
                        <ChevronRight className="w-4 h-4" style={{ color: accent }} />
                      </div>
                    </button>
                  );
                })}
              </div>
              <div className="mt-8 flex gap-2 text-[10px]">
                <button onClick={exportCSV} className="flex-1 text-zinc-600 flex items-center justify-center gap-1 py-2 border border-zinc-800 rounded-lg"><Download className="w-3 h-3" /> Export</button>
                <button onClick={resetData} className="flex-1 text-zinc-700 flex items-center justify-center gap-1 py-2"><RotateCcw className="w-3 h-3" /> Reset</button>
              </div>
            </div>
          </div>
        );
      }

      // DAY OVERVIEW
      if (view === 'dayOverview') {
        const dayData = workoutData[selectedDay];
        const accent = config.dayAccents[selectedDay];
        return (
          <div className="min-h-screen text-white p-4 pb-24" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto">
              <button onClick={() => setView('home')} className="flex items-center text-zinc-500 mb-4 text-sm"><ChevronLeft className="w-4 h-4" /> Back</button>
              <div className="mb-4">
                <div className="text-[9px] font-semibold uppercase tracking-widest mb-0.5" style={{ color: accent }}>Day {selectedDay.replace('day','')}</div>
                <h1 className="text-lg font-bold text-zinc-100">{dayData.name}</h1>
                <p className="text-zinc-500 text-xs">{dayData.focus}</p>
              </div>
              <div className="space-y-1.5 mb-4">
                {dayData.exercises.map((ex, i) => {
                  const lastData = getLastWeekData(ex.id);
                  const primaryColor = muscleColors[ex.muscles[0]] || '#6b7280';
                  return (
                    <div key={ex.id} onClick={() => startExercise(i)} className="rounded-lg p-3 flex items-center gap-2.5 cursor-pointer transition-all active:scale-[0.98] border border-zinc-800/50" style={{ backgroundColor: '#12121a' }}>
                      <div className="w-7 h-7 rounded flex items-center justify-center text-xs font-bold" style={{ background: `${primaryColor}20`, color: primaryColor }}>{i + 1}</div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-zinc-200 truncate">{ex.name.split(' / ')[0]}</div>
                        <div className="text-[10px] text-zinc-600">{ex.sets} × {ex.reps}{lastData ? ` · ${lastData.weight} lbs` : ''}</div>
                      </div>
                      <ChevronRight className="w-3.5 h-3.5 text-zinc-700" />
                    </div>
                  );
                })}
              </div>
              <div className="fixed bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-zinc-950 to-transparent">
                <div className="max-w-md mx-auto"><button onClick={() => startExercise(0)} className="w-full text-white font-semibold py-3.5 rounded-xl text-sm transition-all active:scale-[0.98]" style={{ background: accent }}>Start Workout</button></div>
              </div>
            </div>
          </div>
        );
      }

      // EXERCISE
      if (view === 'exercise') {
        const dayData = workoutData[selectedDay];
        const exercise = dayData.exercises[currentExerciseIndex];
        const progression = calculateProgression(exercise);
        const exerciseConfig = progressionConfig[exercise.id] || defaultProgressionConfig;
        const accent = config.dayAccents[selectedDay];
        const weightIncrement = exerciseConfig.weightIncrement || 5;
        const nameParts = exercise.name.split(' / ');
        const hasAlt = nameParts.length > 1;
        let suggestionColor = accent, suggestionBg = `${accent}15`;
        if (progression.action === 'increase' || progression.action === 'progress') { suggestionColor = '#10b981'; suggestionBg = '#10b98115'; }
        else if (progression.action === 'decrease' || progression.action === 'regress') { suggestionColor = '#f59e0b'; suggestionBg = '#f59e0b15'; }

        const StepBtn = ({ onClick, children }) => (
          <button onClick={onClick} className="w-11 h-11 rounded-lg flex items-center justify-center text-lg font-bold transition-all active:scale-90" style={{ background: `${accent}20`, color: accent }}>{children}</button>
        );

        return (
          <div className="min-h-screen text-white p-3 pb-16" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto">
              <div className="flex justify-between items-center mb-2">
                <button onClick={() => setView('dayOverview')} className="text-zinc-500 p-1"><ChevronLeft className="w-5 h-5" /></button>
                <div className="text-[10px] text-zinc-600">{currentExerciseIndex + 1}/{dayData.exercises.length}</div>
                <div className="w-7" />
              </div>
              <div className="h-0.5 bg-zinc-800 rounded-full mb-3 overflow-hidden"><div className="h-full rounded-full" style={{ width: `${((currentExerciseIndex + 1) / dayData.exercises.length) * 100}%`, background: accent }} /></div>
              <h1 className="text-base font-bold text-zinc-100 mb-0.5">{nameParts[0]}</h1>
              <p className="text-zinc-500 text-[10px] mb-2">{exercise.notes}</p>
              <ExerciseAnimation exerciseId={exercise.id} accent={accent} />
              {hasAlt && <button className="w-full py-1.5 mt-2 text-[9px] text-zinc-600 border-b border-zinc-800/50">Alt: {nameParts[1]} →</button>}
              {progression.suggestion && (
                <div className="rounded-lg px-2 py-1.5 text-[10px] mt-2 flex items-center gap-2" style={{ background: suggestionBg, color: suggestionColor }}>
                  {progression.icon && <progression.icon className="w-3 h-3" />}
                  <span>{progression.suggestion}</span>
                </div>
              )}
              <div className="space-y-2 mt-3">
                {currentSets.map((set, i) => (
                  <div key={i} className={`rounded-lg p-2 border ${set.completed ? 'border-emerald-500/50 bg-emerald-500/10' : 'border-zinc-800/50 bg-zinc-900/30'}`}>
                    <div className="flex items-center gap-2">
                      <button onClick={() => toggleSetComplete(i)} className={`w-6 h-6 rounded flex items-center justify-center transition-all active:scale-90 flex-shrink-0 text-[10px] font-bold ${set.completed ? 'bg-emerald-500 text-white' : 'bg-zinc-800 text-zinc-500'}`}>
                        {set.completed ? <Check className="w-3.5 h-3.5" /> : i + 1}
                      </button>
                      <div className="flex items-center gap-1 flex-1">
                        <StepBtn onClick={() => updateSet(i, 'weight', Math.max(0, set.weight - weightIncrement))}>−</StepBtn>
                        <div className="flex-1 text-center"><div className="text-base font-bold text-zinc-100">{set.weight}</div><div className="text-[7px] text-zinc-600 -mt-0.5">lbs</div></div>
                        <StepBtn onClick={() => updateSet(i, 'weight', set.weight + weightIncrement)}>+</StepBtn>
                      </div>
                      <div className="w-px h-6 bg-zinc-800" />
                      <div className="flex items-center gap-1 flex-1">
                        <StepBtn onClick={() => updateSet(i, 'reps', Math.max(1, set.reps - 1))}>−</StepBtn>
                        <div className="flex-1 text-center"><div className="text-base font-bold text-zinc-100">{set.reps}</div><div className="text-[7px] text-zinc-600 -mt-0.5">reps</div></div>
                        <StepBtn onClick={() => updateSet(i, 'reps', set.reps + 1)}>+</StepBtn>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="fixed bottom-4 left-0 right-0 pointer-events-none">
                <div className="max-w-md mx-auto px-4 flex justify-between">
                  <button onClick={prevExercise} disabled={currentExerciseIndex === 0} className="pointer-events-auto w-12 h-12 flex items-center justify-center text-3xl text-zinc-600 disabled:opacity-20 active:scale-90">‹</button>
                  <button onClick={nextExercise} className="pointer-events-auto w-12 h-12 flex items-center justify-center text-3xl active:scale-90" style={{ color: accent }}>›</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // COMPLETE
      if (view === 'complete') {
        const dayData = workoutData[selectedDay];
        const accent = config.dayAccents[selectedDay];
        return (
          <div className="min-h-screen text-white p-4 flex items-center justify-center" style={{ background: config.bgGradient }}>
            <div className="max-w-md mx-auto text-center">
              <div className="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-6" style={{ background: accent }}><Trophy className="w-9 h-9 text-white" /></div>
              <h1 className="text-xl font-bold text-zinc-100 mb-1">Workout Complete</h1>
              <p className="text-zinc-500 text-sm mb-8">{dayData.name}</p>
              <button onClick={() => { setView('home'); setSelectedDay(null); }} className="w-full text-white font-semibold py-3.5 rounded-xl text-sm" style={{ background: accent }}>Done</button>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutApp />);
  </script>
</body>
</html>
