<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Understory - NYC Wildflower Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --cream: #faf8f3;
      --cream-dark: #f0ebe0;
      --paper: #f5f2eb;
      --sage: #6b7c5e;
      --sage-light: #8a9c7c;
      --sage-dark: #4a5a40;
      --earth: #8b7355;
      --earth-dark: #5d4e3a;
      --earth-light: #a89070;
      --ink: #2d2a26;
      --ink-light: #4a4642;
      --ink-faded: #7a756d;
      --corner-color: #3d3428;
      --shadow-soft: rgba(45, 42, 38, 0.08);
      --shadow-medium: rgba(45, 42, 38, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
    }

    /* Typography */
    .font-display {
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* Loading spinner */
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--cream-dark);
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fade in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    /* Photo corner mounts - like a vintage album */
    .photo-container {
      position: relative;
      background: var(--paper);
      padding: 24px;
      border-radius: 2px;
    }

    .photo-mount {
      position: relative;
      background: #1a1816;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.2),
        inset 0 0 40px rgba(0,0,0,0.3);
    }

    /* Corner mounts */
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 10;
    }
    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: var(--corner-color);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 1px 2px rgba(0,0,0,0.3);
    }
    /* Top-left corner */
    .corner-tl { top: -4px; left: -4px; }
    .corner-tl::before {
      width: 28px; height: 8px;
      top: 0; left: 0;
      border-radius: 2px 2px 0 2px;
    }
    .corner-tl::after {
      width: 8px; height: 28px;
      top: 0; left: 0;
      border-radius: 2px 0 2px 2px;
    }
    /* Top-right corner */
    .corner-tr { top: -4px; right: -4px; }
    .corner-tr::before {
      width: 28px; height: 8px;
      top: 0; right: 0;
      border-radius: 2px 2px 2px 0;
    }
    .corner-tr::after {
      width: 8px; height: 28px;
      top: 0; right: 0;
      border-radius: 0 2px 2px 2px;
    }
    /* Bottom-left corner */
    .corner-bl { bottom: -4px; left: -4px; }
    .corner-bl::before {
      width: 28px; height: 8px;
      bottom: 0; left: 0;
      border-radius: 0 2px 2px 2px;
    }
    .corner-bl::after {
      width: 8px; height: 28px;
      bottom: 0; left: 0;
      border-radius: 2px 2px 0 2px;
    }
    /* Bottom-right corner */
    .corner-br { bottom: -4px; right: -4px; }
    .corner-br::before {
      width: 28px; height: 8px;
      bottom: 0; right: 0;
      border-radius: 2px 0 2px 2px;
    }
    .corner-br::after {
      width: 8px; height: 28px;
      bottom: 0; right: 0;
      border-radius: 2px 2px 2px 0;
    }

    /* Tags and badges */
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .toxicity-safe { background: #e8f0e4; color: #3d5a35; }
    .toxicity-caution { background: #f5eedf; color: #7a6530; }
    .toxicity-toxic { background: #f5e4e4; color: #8b4049; }
    .pollinator-tag { background: #e8f0e4; color: #4a6342; }
    .family-tag { background: var(--cream-dark); color: var(--ink-light); border: 1px solid #e0dbd0; }

    .sr-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(4px);
      box-shadow: 0 1px 3px var(--shadow-soft);
    }
    .sr-new { color: var(--ink-faded); }
    .sr-learning { color: #8b6914; }
    .sr-familiar { color: var(--sage); }
    .sr-mastered { color: #7b5ea7; }

    /* Lookalike warning box */
    .lookalike-box {
      background: #fdf8f6;
      border: 1px solid #e8d8d0;
      border-left: 3px solid #c49a7a;
      padding: 14px 18px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .lookalike-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: #9a6a50;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    /* Hint reveal button */
    .hint-reveal-btn {
      background: var(--cream);
      border: 1px dashed #c5bfb0;
      padding: 14px 18px;
      border-radius: 4px;
      width: 100%;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--ink-faded);
      margin-bottom: 20px;
      transition: all 0.2s ease;
    }
    .hint-reveal-btn:hover {
      background: var(--cream-dark);
      border-style: solid;
      color: var(--ink-light);
    }

    /* Button base styles */
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: var(--sage);
      color: white;
    }
    .btn-primary:hover {
      background: var(--sage-dark);
    }
    .btn-secondary {
      background: var(--cream-dark);
      color: var(--ink-light);
    }
    .btn-secondary:hover {
      background: #e5e0d5;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid #d5d0c5;
      color: var(--ink-light);
    }
    .btn-ghost:hover {
      background: var(--cream-dark);
      border-color: #c5c0b5;
    }

    /* Mode tabs */
    .mode-tab {
      padding: 10px 28px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faded);
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }
    .mode-tab:hover {
      color: var(--ink-light);
    }
    .mode-tab.active {
      color: var(--sage-dark);
    }
    .mode-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 2px;
      background: var(--sage);
      border-radius: 1px;
    }

    /* Progress bar */
    .progress-track {
      background: var(--cream-dark);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--sage);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Input field */
    .text-input {
      width: 100%;
      padding: 14px 18px;
      font-family: inherit;
      font-size: 1rem;
      border: 1px solid #d5d0c5;
      border-radius: 4px;
      background: white;
      color: var(--ink);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .text-input:focus {
      outline: none;
      border-color: var(--sage-light);
      box-shadow: 0 0 0 3px rgba(107, 124, 94, 0.1);
    }
    .text-input::placeholder {
      color: #b0a898;
    }

    /* Expandable section button */
    .expand-btn {
      width: 100%;
      background: none;
      border: 1px solid #e5e0d5;
      border-radius: 4px;
      padding: 14px 18px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--ink-light);
      transition: all 0.2s ease;
    }
    .expand-btn:hover {
      background: var(--cream);
      border-color: #d5d0c5;
    }

    /* Card styling */
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px var(--shadow-soft), 0 8px 24px var(--shadow-medium);
      overflow: hidden;
    }
  </style>
</head>

    ];

    const SR_INTERVALS = { new: 0, learning: 4, familiar: 24, mastered: 72 };
    const loadProgress = () => { try { return JSON.parse(localStorage.getItem('understory-progress')) || {}; } catch { return {}; } };
    const saveProgress = (p) => { try { localStorage.setItem('understory-progress', JSON.stringify(p)); } catch {} };
    const getSRLevel = (card) => { if (!card || card.timesCorrect === 0) return 'new'; if (card.timesCorrect < 2) return 'learning'; if (card.timesCorrect < 5) return 'familiar'; return 'mastered'; };
    const isDue = (card) => { if (!card || !card.lastSeen) return true; const level = getSRLevel(card); return (Date.now() - card.lastSeen) / 3600000 >= SR_INTERVALS[level]; };

    // Shuffle array (Fisher-Yates)
    const shuffleArray = (arr) => {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

    async function fetchINaturalistPhotos(latinName) {
      try {
        const url = `https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(latinName)}&quality_grade=research&photos=true&per_page=6&order_by=votes`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.results?.length > 0) {
          const photos = [];
          for (const obs of data.results) {
            for (const photo of (obs.photos || [])) {
              photos.push({ url: photo.url.replace('square', 'medium'), attribution: photo.attribution || 'iNaturalist', observationUrl: `https://www.inaturalist.org/observations/${obs.id}` });
              if (photos.length >= 5) break;
            }
            if (photos.length >= 5) break;
          }
          return photos;
        }
      } catch (e) { console.error(e); }
      return null;
    }

    async function fetchRegionalData(latinName) {
      try {
        const [ne, total] = await Promise.all([
          fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(latinName)}&quality_grade=research&per_page=0&place_id=47`).then(r => r.json()),
          fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(latinName)}&quality_grade=research&per_page=0`).then(r => r.json())
        ]);
        return { northeastCount: ne.total_results || 0, totalCount: total.total_results || 0 };
      } catch { return null; }
    }

    function ToxicityBadge({ level, note }) {
      const labels = { safe: 'Safe to touch', caution: 'Use caution', toxic: 'Toxic' };
      const icons = { safe: '', caution: '', toxic: '' };
      return (
        <div style={{ marginBottom: '16px' }}>
          <span className={`tag toxicity-${level}`}>{icons[level]} {labels[level]}</span>
          <p style={{ fontSize: '0.85rem', color: 'var(--ink-faded)', marginTop: '8px', lineHeight: '1.5' }}>{note}</p>
        </div>
      );
    }

    function SRBadge({ level, timesCorrect, lastSeen }) {
      const labels = { new: 'New', learning: 'Learning', familiar: 'Familiar', mastered: 'Mastered' };
      const icons = { new: '', learning: '', familiar: '', mastered: '' };
      return (
        <div className={`sr-badge sr-${level}`} title={lastSeen ? `Last reviewed: ${new Date(lastSeen).toLocaleDateString()}` : 'Not yet studied'}>
          {icons[level]} {labels[level]} {timesCorrect > 0 && <span style={{ opacity: 0.7 }}>({timesCorrect})</span>}
        </div>
      );
    }

    function LookalikeWarning({ text }) {
      if (!text) return null;
      return (
        <div className="lookalike-box">
          <p className="lookalike-title">Frequently Confused With</p>
          <p style={{ fontSize: '0.85rem', color: 'var(--earth-dark)', lineHeight: '1.6', margin: 0 }}>{text}</p>
        </div>
      );
    }

    function App() {
      const [mode, setMode] = React.useState('learn');
      const [shuffledOrder, setShuffledOrder] = React.useState(null);
      const [currentIndex, setCurrentIndex] = React.useState(0);
      const [showAnswer, setShowAnswer] = React.useState(false);
      const [showHint, setShowHint] = React.useState(false);
      const [userGuess, setUserGuess] = React.useState('');
      const [feedback, setFeedback] = React.useState(null);
      const [imageError, setImageError] = React.useState(false);
      const [photoIndex, setPhotoIndex] = React.useState(0);
      const [expandedSection, setExpandedSection] = React.useState(null);
      const [progress, setProgress] = React.useState(loadProgress);
      const [photoCache, setPhotoCache] = React.useState({});
      const [loadingPhotos, setLoadingPhotos] = React.useState(false);
      const [regionalCache, setRegionalCache] = React.useState({});
      const [transitioning, setTransitioning] = React.useState(false);

      // Get current flower based on mode
      const displayOrder = (mode === 'learn' || !shuffledOrder) ? WILDFLOWERS : shuffledOrder;
      const currentFlower = displayOrder[currentIndex];
      const currentPhotos = photoCache[currentFlower.latinName];
      const currentRegional = regionalCache[currentFlower.latinName];
      const cardProgress = progress[currentFlower.id] || { timesCorrect: 0, timesIncorrect: 0, lastSeen: null };

      // Shuffle when entering practice/test mode
      const handleModeChange = (newMode) => {
        setMode(newMode);
        setShowAnswer(false);
        setShowHint(false);
        setFeedback(null);
        setUserGuess('');
        setCurrentIndex(0);
        if (newMode === 'practice' || newMode === 'test') {
          setShuffledOrder(shuffleArray(WILDFLOWERS));
        } else {
          setShuffledOrder(null);
        }
      };

      React.useEffect(() => {
        if (!photoCache[currentFlower.latinName]) {
          setLoadingPhotos(true);
          fetchINaturalistPhotos(currentFlower.latinName).then(photos => {
            setPhotoCache(prev => ({ ...prev, [currentFlower.latinName]: photos || [] }));
            setLoadingPhotos(false);
          });
        }
      }, [currentFlower.latinName]);

      React.useEffect(() => {
        if (!regionalCache[currentFlower.latinName]) {
          fetchRegionalData(currentFlower.latinName).then(data => {
            if (data) setRegionalCache(prev => ({ ...prev, [currentFlower.latinName]: data }));
          });
        }
      }, [currentFlower.latinName]);

      React.useEffect(() => { saveProgress(progress); }, [progress]);

      const getDueCards = () => WILDFLOWERS.filter(f => isDue(progress[f.id]));

      const navigateFlower = (direction) => {
        setTransitioning(true);
        setTimeout(() => {
          setShowAnswer(false);
          setShowHint(false);
          setUserGuess('');
          setFeedback(null);
          setImageError(false);
          setPhotoIndex(0);
          setExpandedSection(null);
          if (direction === 'next') {
            setCurrentIndex((prev) => (prev + 1) % displayOrder.length);
          } else {
            setCurrentIndex((prev) => (prev - 1 + displayOrder.length) % displayOrder.length);
          }
          setTransitioning(false);
        }, 150);
      };

      const recordAnswer = (correct) => {
        setProgress(prev => ({ ...prev, [currentFlower.id]: { timesCorrect: (prev[currentFlower.id]?.timesCorrect || 0) + (correct ? 1 : 0), timesIncorrect: (prev[currentFlower.id]?.timesIncorrect || 0) + (correct ? 0 : 1), lastSeen: Date.now() } }));
      };

      const checkGuess = () => {
        const guess = userGuess.toLowerCase().trim();
        const commonName = currentFlower.commonName.toLowerCase();
        const latinName = currentFlower.latinName.toLowerCase();
        if (guess === commonName || guess === latinName || (commonName.includes(guess) && guess.length > 3) || (latinName.includes(guess) && guess.length > 3)) {
          setFeedback({ correct: true, message: 'Correct!' }); setShowAnswer(true); recordAnswer(true);
        } else {
          setFeedback({ correct: false, message: 'Not quite. Try again or reveal the answer.' });
        }
      };

      const giveUp = () => { setShowAnswer(true); recordAnswer(false); };
      const cyclePhoto = () => { if (currentPhotos?.length > 1) { setPhotoIndex((prev) => (prev + 1) % currentPhotos.length); setImageError(false); } };

      const currentPhoto = currentPhotos?.[photoIndex];
      const dueCount = getDueCards().length;
      const masteredCount = WILDFLOWERS.filter(f => getSRLevel(progress[f.id]) === 'mastered').length;

      return (
        <div style={{ minHeight: '100vh', background: 'var(--cream)', padding: '24px 16px 48px' }}>
          {/* Header */}
          <header style={{ textAlign: 'center', marginBottom: '32px', maxWidth: '600px', margin: '0 auto 32px' }}>
            <h1 className="font-display" style={{
              fontSize: '2.2rem',
              fontWeight: '500',
              letterSpacing: '0.12em',
              color: 'var(--ink)',
              margin: '0 0 6px 0',
              textTransform: 'uppercase'
            }}>Understory</h1>
            <p style={{
              fontSize: '0.8rem',
              color: 'var(--ink-faded)',
              letterSpacing: '0.08em',
              textTransform: 'uppercase'
            }}>NYC Regional Wildflowers</p>
          </header>

          {/* Mode Tabs */}
          <div style={{ display: 'flex', justifyContent: 'center', gap: '8px', marginBottom: '24px', borderBottom: '1px solid #e5e0d5', paddingBottom: '12px', maxWidth: '400px', margin: '0 auto 24px' }}>
            {['learn', 'practice', 'test'].map((m) => (
              <button
                key={m}
                onClick={() => handleModeChange(m)}
                className={`mode-tab ${mode === m ? 'active' : ''}`}
              >{m}</button>
            ))}
          </div>

          {/* Progress Bar */}
          <div style={{ maxWidth: '500px', margin: '0 auto 20px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: 'var(--ink-faded)', marginBottom: '8px' }}>
              <span>{masteredCount} of {WILDFLOWERS.length} mastered</span>
              <span>{dueCount} due for review</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${(masteredCount / WILDFLOWERS.length) * 100}%` }} />
            </div>
          </div>

          {/* Shuffle indicator */}
          {(mode !== 'learn' && shuffledOrder) && (
            <p style={{ textAlign: 'center', fontSize: '0.75rem', color: 'var(--ink-faded)', marginBottom: '20px', fontStyle: 'italic' }}>
              Cards shuffled for {mode} mode
            </p>
          )}

          {/* Main Card */}
          <div className="card" style={{
            maxWidth: '520px',
            margin: '0 auto',
            opacity: transitioning ? 0.5 : 1,
            transform: transitioning ? 'scale(0.98)' : 'scale(1)',
            transition: 'opacity 0.15s ease, transform 0.15s ease'
          }}>
            {/* Photo Section with Corner Mounts */}
            <div className="photo-container">
              <div className="photo-mount" style={{ aspectRatio: '4/3', position: 'relative' }}>
                {/* Corner mounts */}
                <div className="corner corner-tl"></div>
                <div className="corner corner-tr"></div>
                <div className="corner corner-bl"></div>
                <div className="corner corner-br"></div>

                {/* Photo content */}
                <div
                  onClick={cyclePhoto}
                  style={{
                    width: '100%',
                    height: '100%',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    cursor: currentPhotos?.length > 1 ? 'pointer' : 'default',
                    position: 'relative'
                  }}
                >
                  {loadingPhotos ? (
                    <div style={{ textAlign: 'center', color: '#a0a0a0' }}>
                      <div className="loading-spinner" style={{ margin: '0 auto 12px' }}></div>
                      <p style={{ fontSize: '0.8rem' }}>Loading photo...</p>
                    </div>
                  ) : currentPhoto && !imageError ? (
                    <img
                      src={currentPhoto.url}
                      alt={currentFlower.commonName}
                      style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                      onError={() => setImageError(true)}
                    />
                  ) : (
                    <div style={{ textAlign: 'center', padding: '40px', color: '#888' }}>
                      <div style={{
                        width: '64px',
                        height: '64px',
                        borderRadius: '50%',
                        background: currentFlower.color,
                        margin: '0 auto 12px',
                        border: '2px solid rgba(255,255,255,0.3)'
                      }} />
                      <p className="font-display" style={{ margin: 0, fontStyle: 'italic', fontSize: '0.95rem' }}>{currentFlower.latinName}</p>
                    </div>
                  )}

                  {/* SR Badge overlay */}
                  <div style={{ position: 'absolute', top: '12px', left: '12px' }}>
                    <SRBadge level={getSRLevel(cardProgress)} timesCorrect={cardProgress.timesCorrect} lastSeen={cardProgress.lastSeen} />
                  </div>

                  {/* Photo counter */}
                  {currentPhotos?.length > 1 && !loadingPhotos && (
                    <div style={{
                      position: 'absolute',
                      top: '12px',
                      right: '12px',
                      background: 'rgba(0,0,0,0.6)',
                      color: '#fff',
                      padding: '4px 10px',
                      borderRadius: '3px',
                      fontSize: '0.7rem',
                      fontWeight: '500'
                    }}>{photoIndex + 1} / {currentPhotos.length}</div>
                  )}

                  {/* Attribution */}
                  {currentPhoto && !loadingPhotos && (
                    <div style={{
                      position: 'absolute',
                      bottom: 0,
                      left: 0,
                      right: 0,
                      background: 'linear-gradient(transparent, rgba(0,0,0,0.7))',
                      padding: '24px 12px 10px'
                    }}>
                      <p style={{ margin: 0, fontSize: '0.65rem', color: 'rgba(255,255,255,0.8)', textAlign: 'right' }}>{currentPhoto.attribution}</p>
                      <p style={{ margin: '2px 0 0 0', fontSize: '0.6rem', textAlign: 'right' }}>
                        <a href={currentPhoto.observationUrl} target="_blank" rel="noopener noreferrer" style={{ color: 'rgba(255,255,255,0.6)' }}>View on iNaturalist</a>
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Content Section */}
            <div style={{ padding: '28px 24px 24px' }}>
              {mode === 'learn' && (
                <div className="fade-in">
                  {/* Species name */}
                  <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                    <h2 className="font-display" style={{
                      fontSize: '1.75rem',
                      fontWeight: '500',
                      color: 'var(--ink)',
                      margin: '0 0 4px 0'
                    }}>{currentFlower.commonName}</h2>
                    <p className="font-display" style={{
                      fontSize: '1.05rem',
                      fontStyle: 'italic',
                      color: 'var(--ink-faded)',
                      margin: '0 0 12px 0'
                    }}>{currentFlower.latinName}</p>
                    <span className="tag family-tag">{currentFlower.family}</span>
                  </div>

                  {/* Quick facts */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px' }}>
                    <div>
                      <p style={{ margin: '0 0 4px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Habitat</p>
                      <p style={{ margin: 0, fontSize: '0.9rem', color: 'var(--ink-light)' }}>{currentFlower.habitat}</p>
                    </div>
                    <div>
                      <p style={{ margin: '0 0 4px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Season</p>
                      <p style={{ margin: 0, fontSize: '0.9rem', color: 'var(--ink-light)' }}>{currentFlower.season}</p>
                    </div>
                  </div>

                  {/* Key ID features */}
                  <div style={{
                    background: 'var(--cream)',
                    padding: '16px 18px',
                    borderRadius: '4px',
                    borderLeft: '3px solid var(--sage)',
                    marginBottom: '20px'
                  }}>
                    <p style={{ margin: '0 0 6px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Key Identification Features</p>
                    <p style={{ margin: 0, fontSize: '0.95rem', color: 'var(--ink-light)', lineHeight: '1.6' }}>{currentFlower.hint}</p>
                  </div>

                  <ToxicityBadge level={currentFlower.toxicity} note={currentFlower.toxicityNote} />
                  <LookalikeWarning text={currentFlower.lookalikes} />

                  {/* Expandable sections */}
                  <div style={{ borderTop: '1px solid #e8e4da', paddingTop: '20px' }}>
                    <button
                      onClick={() => setExpandedSection(expandedSection === 'ecology' ? null : 'ecology')}
                      className="expand-btn"
                      style={{ marginBottom: '10px' }}
                    >
                      <span>Ecology & Wildlife</span>
                      <span style={{ fontSize: '1.1rem', color: 'var(--ink-faded)' }}>{expandedSection === 'ecology' ? '−' : '+'}</span>
                    </button>

                    {expandedSection === 'ecology' && (
                      <div className="fade-in" style={{ padding: '16px 18px', background: 'var(--cream)', borderRadius: '4px', marginBottom: '10px' }}>
                        <p style={{ margin: '0 0 10px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Pollinators</p>
                        <div style={{ marginBottom: '16px' }}>
                          {currentFlower.pollinators.map((p, i) => (<span key={i} className="tag pollinator-tag">{p}</span>))}
                        </div>
                        <p style={{ margin: '0 0 8px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Wildlife Value</p>
                        <p style={{ margin: 0, fontSize: '0.9rem', color: 'var(--ink-light)', lineHeight: '1.6' }}>{currentFlower.wildlife}</p>
                      </div>
                    )}

                    <button
                      onClick={() => setExpandedSection(expandedSection === 'region' ? null : 'region')}
                      className="expand-btn"
                    >
                      <span>Range & Observations</span>
                      <span style={{ fontSize: '1.1rem', color: 'var(--ink-faded)' }}>{expandedSection === 'region' ? '−' : '+'}</span>
                    </button>

                    {expandedSection === 'region' && (
                      <div className="fade-in" style={{ padding: '16px 18px', background: 'var(--cream)', borderRadius: '4px', marginTop: '10px' }}>
                        <p style={{ margin: '0 0 8px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Native Status</p>
                        <p style={{ margin: '0 0 16px 0', fontSize: '0.9rem', color: 'var(--ink-light)' }}>{currentFlower.nativeStatus}</p>
                        <p style={{ margin: '0 0 10px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>iNaturalist Observations</p>
                        {currentRegional ? (
                          <div style={{ display: 'flex', gap: '24px' }}>
                            <div>
                              <span className="font-display" style={{ fontSize: '1.5rem', fontWeight: '500', color: 'var(--sage-dark)' }}>{currentRegional.northeastCount.toLocaleString()}</span>
                              <p style={{ margin: '2px 0 0 0', fontSize: '0.75rem', color: 'var(--ink-faded)' }}>Northeast US</p>
                            </div>
                            <div>
                              <span className="font-display" style={{ fontSize: '1.5rem', fontWeight: '500', color: 'var(--ink-light)' }}>{currentRegional.totalCount.toLocaleString()}</span>
                              <p style={{ margin: '2px 0 0 0', fontSize: '0.75rem', color: 'var(--ink-faded)' }}>Worldwide</p>
                            </div>
                          </div>
                        ) : (
                          <p style={{ color: 'var(--ink-faded)', fontSize: '0.85rem' }}>Loading...</p>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {(mode === 'practice' || mode === 'test') && (
                <div className="fade-in">
                  {!showAnswer && mode === 'practice' && (
                    showHint ? (
                      <div style={{
                        background: 'var(--cream)',
                        padding: '16px 18px',
                        borderRadius: '4px',
                        marginBottom: '20px',
                        borderLeft: '3px solid var(--earth-light)'
                      }}>
                        <p style={{ margin: '0 0 6px 0', fontSize: '0.7rem', color: 'var(--ink-faded)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: '500' }}>Hint</p>
                        <p style={{ margin: 0, fontSize: '0.95rem', color: 'var(--ink-light)', lineHeight: '1.6' }}>{currentFlower.hint}</p>
                      </div>
                    ) : (
                      <button className="hint-reveal-btn" onClick={() => setShowHint(true)}>
                        Tap to reveal hint
                      </button>
                    )
                  )}

                  {!showAnswer && mode === 'test' && (
                    <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--ink-faded)', marginBottom: '20px' }}>Identify this wildflower</p>
                  )}

                  {!showAnswer ? (
                    <div>
                      <input
                        type="text"
                        value={userGuess}
                        onChange={(e) => setUserGuess(e.target.value)}
                        onKeyPress={(e) => e.key === 'Enter' && checkGuess()}
                        placeholder="Enter flower name..."
                        className="text-input"
                        style={{ marginBottom: '12px' }}
                      />
                      {feedback && (
                        <p style={{
                          margin: '0 0 12px 0',
                          color: feedback.correct ? 'var(--sage-dark)' : '#a65858',
                          fontSize: '0.9rem'
                        }}>{feedback.message}</p>
                      )}
                      <div style={{ display: 'flex', gap: '12px' }}>
                        <button onClick={checkGuess} className="btn btn-primary" style={{ flex: 1 }}>Check</button>
                        <button onClick={giveUp} className="btn btn-secondary" style={{ flex: 1 }}>{mode === 'test' ? 'Give Up' : 'Reveal'}</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                        <h2 className="font-display" style={{
                          fontSize: '1.75rem',
                          fontWeight: '500',
                          color: 'var(--ink)',
                          margin: '0 0 4px 0'
                        }}>{currentFlower.commonName}</h2>
                        <p className="font-display" style={{
                          fontSize: '1.05rem',
                          fontStyle: 'italic',
                          color: 'var(--ink-faded)',
                          margin: '0 0 12px 0'
                        }}>{currentFlower.latinName}</p>
                        <span className="tag family-tag">{currentFlower.family}</span>
                      </div>
                      <p style={{ margin: '0 0 16px 0', fontSize: '0.9rem', color: 'var(--ink-light)', textAlign: 'center' }}>{currentFlower.habitat} • {currentFlower.season}</p>
                      <ToxicityBadge level={currentFlower.toxicity} note={currentFlower.toxicityNote} />
                      <LookalikeWarning text={currentFlower.lookalikes} />
                    </div>
                  )}
                </div>
              )}

              {/* Navigation */}
              <div style={{
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                marginTop: '28px',
                paddingTop: '20px',
                borderTop: '1px solid #e8e4da'
              }}>
                <button onClick={() => navigateFlower('prev')} className="btn btn-ghost">Prev</button>
                <span style={{ fontSize: '0.85rem', color: 'var(--ink-faded)', fontWeight: '500' }}>{currentIndex + 1} / {displayOrder.length}</span>
                <button onClick={() => navigateFlower('next')} className="btn btn-ghost">Next</button>
              </div>
            </div>
          </div>

          {/* Footer */}
          <footer style={{ textAlign: 'center', marginTop: '40px', padding: '16px', color: 'var(--ink-faded)', fontSize: '0.75rem' }}>
            <p style={{ margin: '0 0 6px 0' }}>
              Photos from <a href="https://www.inaturalist.org" target="_blank" style={{ color: 'var(--sage)' }}>iNaturalist</a> • Research-grade observations
            </p>
            <p style={{ margin: 0 }}>
              Species from <a href="https://www.nycgovparks.org/learn/trees-and-plants/native-plants-of-new-york-city-spring-ephemerals" target="_blank" style={{ color: 'var(--sage)' }}>NYC Parks</a> native plant guides
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
