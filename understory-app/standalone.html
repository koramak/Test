  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', 'Times New Roman', serif; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #d4cfc4; border-top-color: #5c6b4a; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toxicity-safe { background: #d4edda; color: #155724; }
    .toxicity-caution { background: #fff3cd; color: #856404; }
    .toxicity-toxic { background: #f8d7da; color: #721c24; }
    .tag { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px; margin-bottom: 4px; }
    .pollinator-tag { background: #e8f4ea; color: #2d5a3d; }
    .family-tag { background: #f4e8f4; color: #5a2d5a; }
    .sr-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; background: #f0f0f0; }
    .sr-new { background: #e3f2fd; color: #1565c0; }
    .sr-learning { background: #fff8e1; color: #f57f17; }
    .sr-familiar { background: #e8f5e9; color: #2e7d32; }
    .sr-mastered { background: #f3e5f5; color: #7b1fa2; }

    /* Ornate gold picture frame */
    .ornate-frame {
      position: relative;
      padding: 20px;
      background: linear-gradient(135deg, #8B7355 0%, #D4AF37 10%, #FFD700 25%, #D4AF37 40%, #8B6914 50%, #D4AF37 60%, #FFD700 75%, #D4AF37 90%, #8B7355 100%);
      border-radius: 6px;
      box-shadow:
        0 0 0 2px #5a4a2d,
        0 0 0 4px #d4af37,
        0 0 0 6px #8b6914,
        0 0 0 10px #3d2914,
        inset 0 0 20px rgba(0,0,0,0.4),
        0 10px 30px rgba(0,0,0,0.4);
    }
    .ornate-frame::before {
      content: '';
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 3px solid;
      border-image: linear-gradient(135deg, #FFD700, #8B6914, #FFD700, #D4AF37, #FFD700) 1;
      pointer-events: none;
    }
    .ornate-frame::after {
      content: '';
      position: absolute;
      top: 12px; left: 12px; right: 12px; bottom: 12px;
      border: 2px solid #3d2914;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    .frame-inner {
      position: relative;
      background: #1a1714;
      border: 3px solid #2a2218;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
      overflow: hidden;
    }
    /* Corner ornaments */
    .corner-ornament {
      position: absolute;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle, #FFD700 0%, #D4AF37 50%, #8B6914 100%);
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(0,0,0,0.5), inset 0 0 4px rgba(255,255,255,0.3);
      z-index: 10;
    }
    .corner-tl { top: 4px; left: 4px; }
    .corner-tr { top: 4px; right: 4px; }
    .corner-bl { bottom: 4px; left: 4px; }
    .corner-br { bottom: 4px; right: 4px; }

    .lookalike-box { background: #fff5f5; border: 1px solid #f5c6c6; border-left: 3px solid #e57373; padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .lookalike-title { font-size: 0.75rem; color: #c62828; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .hint-reveal-btn { background: #f9f8f5; border: 1px dashed #d4a574; padding: 12px 16px; border-radius: 6px; width: 100%; cursor: pointer; font-family: inherit; font-size: 0.9rem; color: #8b7355; margin-bottom: 16px; transition: all 0.2s; }
    .hint-reveal-btn:hover { background: #f5f0e8; border-style: solid; }
  </style>
</head>

    const SR_INTERVALS = { new: 0, learning: 4, familiar: 24, mastered: 72 };
    const loadProgress = () => { try { return JSON.parse(localStorage.getItem('understory-progress')) || {}; } catch { return {}; } };
    const saveProgress = (p) => { try { localStorage.setItem('understory-progress', JSON.stringify(p)); } catch {} };
    const getSRLevel = (card) => { if (!card || card.timesCorrect === 0) return 'new'; if (card.timesCorrect < 2) return 'learning'; if (card.timesCorrect < 5) return 'familiar'; return 'mastered'; };
    const isDue = (card) => { if (!card || !card.lastSeen) return true; const level = getSRLevel(card); return (Date.now() - card.lastSeen) / 3600000 >= SR_INTERVALS[level]; };

    // Shuffle array (Fisher-Yates)
    const shuffleArray = (arr) => {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

    async function fetchINaturalistPhotos(latinName) {

        const url = `https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(latinName)}&quality_grade=research&photos=true&per_page=6&order_by=votes`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.results?.length > 0) {
          const photos = [];
          for (const obs of data.results) {
            for (const photo of (obs.photos || [])) {
              photos.push({ url: photo.url.replace('square', 'medium'), attribution: photo.attribution || 'iNaturalist', observationUrl: `https://www.inaturalist.org/observations/${obs.id}` });
              if (photos.length >= 5) break;
            }
            if (photos.length >= 5) break;
          }
          return photos;
        }
      } catch (e) { console.error(e); }
      return null;
    }

    async function fetchRegionalData(latinName) {
      try {
        const [ne, total] = await Promise.all([
          fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(latinName)}&quality_grade=research&per_page=0&place_id=47`).then(r => r.json()),
          fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(latinName)}&quality_grade=research&per_page=0`).then(r => r.json())
        ]);
        return { northeastCount: ne.total_results || 0, totalCount: total.total_results || 0 };
      } catch { return null; }
    }

    function ToxicityBadge({ level, note }) {
      const labels = { safe: '✓ Safe', caution: '⚠ Caution', toxic: '☠ Toxic' };
      return (<div style={{ marginBottom: '12px' }}><span className={`tag toxicity-${level}`}>{labels[level]}</span><p style={{ fontSize: '0.8rem', color: '#666', marginTop: '6px', lineHeight: '1.4' }}>{note}</p></div>);
    }

    function SRBadge({ level, timesCorrect, lastSeen }) {
      const labels = { new: '🆕 New', learning: '📖 Learning', familiar: '👍 Familiar', mastered: '⭐ Mastered' };
      return (<div className={`sr-badge sr-${level}`} title={lastSeen ? `Last: ${new Date(lastSeen).toLocaleDateString()}` : 'Not studied'}>{labels[level]} {timesCorrect > 0 && `(${timesCorrect}×)`}</div>);
    }

    function LookalikeWarning({ text }) {
      if (!text) return null;
      return (<div className="lookalike-box"><p className="lookalike-title">⚠️ Frequently Misidentified</p><p style={{ fontSize: '0.85rem', color: '#5d4037', lineHeight: '1.5', margin: 0 }}>{text}</p></div>);
    }

    function App() {
      const [mode, setMode] = React.useState('learn');
      const [shuffledOrder, setShuffledOrder] = React.useState(null);
      const [currentIndex, setCurrentIndex] = React.useState(0);
      const [showAnswer, setShowAnswer] = React.useState(false);
      const [showHint, setShowHint] = React.useState(false);
      const [userGuess, setUserGuess] = React.useState('');
      const [feedback, setFeedback] = React.useState(null);
      const [imageError, setImageError] = React.useState(false);
      const [photoIndex, setPhotoIndex] = React.useState(0);
      const [expandedSection, setExpandedSection] = React.useState(null);
      const [progress, setProgress] = React.useState(loadProgress);
      const [photoCache, setPhotoCache] = React.useState({});
      const [loadingPhotos, setLoadingPhotos] = React.useState(false);
      const [regionalCache, setRegionalCache] = React.useState({});

      // Get current flower based on mode
      const displayOrder = (mode === 'learn' || !shuffledOrder) ? WILDFLOWERS : shuffledOrder;
      const currentFlower = displayOrder[currentIndex];
      const currentPhotos = photoCache[currentFlower.latinName];
      const currentRegional = regionalCache[currentFlower.latinName];
      const cardProgress = progress[currentFlower.id] || { timesCorrect: 0, timesIncorrect: 0, lastSeen: null };

      // Shuffle when entering practice/test mode
      const handleModeChange = (newMode) => {
        setMode(newMode);
        setShowAnswer(false);
        setShowHint(false);
        setFeedback(null);
        setUserGuess('');
        setCurrentIndex(0);
        if (newMode === 'practice' || newMode === 'test') {
          setShuffledOrder(shuffleArray(WILDFLOWERS));
        } else {
          setShuffledOrder(null);
        }
      };

      React.useEffect(() => {
        if (!photoCache[currentFlower.latinName]) {
          setLoadingPhotos(true);
          fetchINaturalistPhotos(currentFlower.latinName).then(photos => {
            setPhotoCache(prev => ({ ...prev, [currentFlower.latinName]: photos || [] }));
            setLoadingPhotos(false);
          });
        }
      }, [currentFlower.latinName]);

      React.useEffect(() => {
        if (!regionalCache[currentFlower.latinName]) {
          fetchRegionalData(currentFlower.latinName).then(data => {
            if (data) setRegionalCache(prev => ({ ...prev, [currentFlower.latinName]: data }));
          });
        }
      }, [currentFlower.latinName]);

      React.useEffect(() => { saveProgress(progress); }, [progress]);

      const getDueCards = () => WILDFLOWERS.filter(f => isDue(progress[f.id]));
      const nextFlower = () => { setShowAnswer(false); setShowHint(false); setUserGuess(''); setFeedback(null); setImageError(false); setPhotoIndex(0); setExpandedSection(null); setCurrentIndex((prev) => (prev + 1) % displayOrder.length); };
      const prevFlower = () => { setShowAnswer(false); setShowHint(false); setUserGuess(''); setFeedback(null); setImageError(false); setPhotoIndex(0); setExpandedSection(null); setCurrentIndex((prev) => (prev - 1 + displayOrder.length) % displayOrder.length); };

      const recordAnswer = (correct) => {
        setProgress(prev => ({ ...prev, [currentFlower.id]: { timesCorrect: (prev[currentFlower.id]?.timesCorrect || 0) + (correct ? 1 : 0), timesIncorrect: (prev[currentFlower.id]?.timesIncorrect || 0) + (correct ? 0 : 1), lastSeen: Date.now() } }));
      };

      const checkGuess = () => {
        const guess = userGuess.toLowerCase().trim();
        const commonName = currentFlower.commonName.toLowerCase();
        const latinName = currentFlower.latinName.toLowerCase();
        if (guess === commonName || guess === latinName || (commonName.includes(guess) && guess.length > 3) || (latinName.includes(guess) && guess.length > 3)) {
          setFeedback({ correct: true, message: 'Correct!' }); setShowAnswer(true); recordAnswer(true);
        } else {
          setFeedback({ correct: false, message: 'Not quite. Try again or reveal the answer.' });
        }
      };

      const giveUp = () => { setShowAnswer(true); recordAnswer(false); };
      const cyclePhoto = () => { if (currentPhotos?.length > 1) { setPhotoIndex((prev) => (prev + 1) % currentPhotos.length); setImageError(false); } };

      const currentPhoto = currentPhotos?.[photoIndex];
      const dueCount = getDueCards().length;
      const masteredCount = WILDFLOWERS.filter(f => getSRLevel(progress[f.id]) === 'mastered').length;

      return (
        <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #f5f5f0 0%, #e8e4d9 100%)', fontFamily: "'Georgia', 'Times New Roman', serif", padding: '20px' }}>
          <header style={{ textAlign: 'center', marginBottom: '24px', paddingBottom: '16px', borderBottom: '2px solid #a8a090' }}>
            <h1 style={{ fontSize: '2.5rem', fontWeight: '400', letterSpacing: '0.3em', color: '#3d3d3d', margin: '0 0 8px 0', textTransform: 'uppercase' }}>Understory</h1>
            <p style={{ fontSize: '0.9rem', color: '#6b6b6b', letterSpacing: '0.15em', margin: 0 }}>NYC Regional Wildflowers • {WILDFLOWERS.length} Species</p>
          </header>

          <div style={{ display: 'flex', justifyContent: 'center', gap: '12px', marginBottom: '24px' }}>
            {['learn', 'practice', 'test'].map((m) => (
              <button key={m} onClick={() => handleModeChange(m)}
                style={{ padding: '10px 24px', border: 'none', borderRadius: '4px', fontSize: '0.85rem', fontFamily: 'inherit', letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', background: mode === m ? '#5c6b4a' : '#d4cfc4', color: mode === m ? '#fff' : '#4a4a4a' }}
              >{m}</button>
            ))}
          </div>

          <div style={{ maxWidth: '600px', margin: '0 auto 16px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: '#6b6b6b', marginBottom: '6px' }}>
              <span>{masteredCount} mastered</span>
              <span>{dueCount} due for review</span>
            </div>
            <div style={{ background: '#d4cfc4', borderRadius: '4px', height: '6px', overflow: 'hidden' }}>
              <div style={{ width: `${(masteredCount / WILDFLOWERS.length) * 100}%`, height: '100%', background: '#5c6b4a', transition: 'width 0.3s ease' }} />
            </div>
          </div>

          {(mode !== 'learn' && shuffledOrder) && (
            <p style={{ textAlign: 'center', fontSize: '0.75rem', color: '#888', marginBottom: '16px', fontStyle: 'italic' }}>
              🔀 Order shuffled for {mode} mode
            </p>
          )}

          <div style={{ maxWidth: '700px', margin: '0 auto', background: '#fff', borderRadius: '8px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', overflow: 'hidden' }}>
            {/* Ornate Gold Frame Photo Section */}
            <div className="ornate-frame" style={{ margin: '16px', marginBottom: '0' }}>
              <div className="corner-ornament corner-tl"></div>
              <div className="corner-ornament corner-tr"></div>
              <div className="corner-ornament corner-bl"></div>
              <div className="corner-ornament corner-br"></div>
              <div className="frame-inner" onClick={cyclePhoto} style={{ aspectRatio: '4/3', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: currentPhotos?.length > 1 ? 'pointer' : 'default' }}>
                {loadingPhotos ? (
                  <div style={{ textAlign: 'center', color: '#a0a0a0' }}>
                    <div className="loading-spinner" style={{ margin: '0 auto 16px', borderColor: '#555', borderTopColor: '#c9a227' }}></div>
                    <p style={{ fontSize: '0.9rem' }}>Loading from iNaturalist...</p>
                  </div>
                ) : currentPhoto && !imageError ? (
                  <img src={currentPhoto.url} alt={currentFlower.commonName} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={() => setImageError(true)} />
                ) : (
                  <div style={{ textAlign: 'center', padding: '40px', color: '#a0a0a0' }}>
                    <div style={{ width: '80px', height: '80px', borderRadius: '50%', background: currentFlower.color, margin: '0 auto 16px', border: '3px solid #555' }} />
                    <p style={{ margin: '0 0 8px 0', fontStyle: 'italic' }}>{currentFlower.latinName}</p>
                  </div>
                )}
                <div style={{ position: 'absolute', top: '12px', left: '12px' }}><SRBadge level={getSRLevel(cardProgress)} timesCorrect={cardProgress.timesCorrect} lastSeen={cardProgress.lastSeen} /></div>
                {currentPhotos?.length > 1 && !loadingPhotos && (<div style={{ position: 'absolute', top: '12px', right: '12px', background: 'rgba(0,0,0,0.6)', color: '#fff', padding: '4px 10px', borderRadius: '12px', fontSize: '0.75rem' }}>{photoIndex + 1} / {currentPhotos.length} • tap</div>)}
                {currentPhoto && !loadingPhotos && (
                  <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, background: 'linear-gradient(transparent, rgba(0,0,0,0.8))', padding: '30px 12px 8px' }}>
                    <p style={{ margin: 0, fontSize: '0.65rem', color: 'rgba(255,255,255,0.9)', textAlign: 'right' }}>{currentPhoto.attribution}</p>
                    <p style={{ margin: '4px 0 0 0', fontSize: '0.6rem', textAlign: 'right' }}><a href={currentPhoto.observationUrl} target="_blank" rel="noopener noreferrer" style={{ color: 'rgba(255,255,255,0.7)' }}>View on iNaturalist →</a></p>
                  </div>
                )}
              </div>
            </div>

            <div style={{ padding: '24px' }}>
              {mode === 'learn' && (
                <>
                  <div style={{ textAlign: 'center', marginBottom: '16px' }}>
                    <h2 style={{ fontSize: '1.8rem', fontWeight: '400', color: '#3d3d3d', margin: '0 0 4px 0' }}>{currentFlower.commonName}</h2>
                    <p style={{ fontSize: '1rem', fontStyle: 'italic', color: '#6b6b6b', margin: '0 0 8px 0' }}>{currentFlower.latinName}</p>
                    <span className="tag family-tag">{currentFlower.family}</span>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <div><p style={{ margin: '0 0 4px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Habitat</p><p style={{ margin: 0, fontSize: '0.95rem', color: '#4a4a4a' }}>{currentFlower.habitat}</p></div>
                    <div><p style={{ margin: '0 0 4px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Season</p><p style={{ margin: 0, fontSize: '0.95rem', color: '#4a4a4a' }}>{currentFlower.season}</p></div>
                  </div>
                  <div style={{ background: '#f9f8f5', padding: '16px', borderRadius: '6px', borderLeft: '3px solid #5c6b4a', marginBottom: '16px' }}>
                    <p style={{ margin: '0 0 4px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Key ID Features</p>
                    <p style={{ margin: 0, fontSize: '0.95rem', color: '#4a4a4a', lineHeight: '1.5' }}>{currentFlower.hint}</p>
                  </div>
                  <ToxicityBadge level={currentFlower.toxicity} note={currentFlower.toxicityNote} />
                  <LookalikeWarning text={currentFlower.lookalikes} />
                  <div style={{ borderTop: '1px solid #e8e4d9', paddingTop: '16px' }}>
                    <button onClick={() => setExpandedSection(expandedSection === 'ecology' ? null : 'ecology')} style={{ width: '100%', background: 'none', border: '1px solid #d4cfc4', borderRadius: '6px', padding: '12px 16px', textAlign: 'left', cursor: 'pointer', marginBottom: '8px', display: 'flex', justifyContent: 'space-between', fontFamily: 'inherit' }}>
                      <span style={{ fontWeight: '500', color: '#4a4a4a' }}>🐝 Ecology & Wildlife</span><span>{expandedSection === 'ecology' ? '−' : '+'}</span>
                    </button>
                    {expandedSection === 'ecology' && (
                      <div style={{ padding: '12px 16px', background: '#fafafa', borderRadius: '6px', marginBottom: '12px' }}>
                        <p style={{ margin: '0 0 8px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Pollinators</p>
                        <div style={{ marginBottom: '12px' }}>{currentFlower.pollinators.map((p, i) => (<span key={i} className="tag pollinator-tag">{p}</span>))}</div>
                        <p style={{ margin: '0 0 8px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Wildlife Value</p>
                        <p style={{ margin: 0, fontSize: '0.9rem', color: '#4a4a4a', lineHeight: '1.5' }}>{currentFlower.wildlife}</p>
                      </div>
                    )}
                    <button onClick={() => setExpandedSection(expandedSection === 'region' ? null : 'region')} style={{ width: '100%', background: 'none', border: '1px solid #d4cfc4', borderRadius: '6px', padding: '12px 16px', textAlign: 'left', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', fontFamily: 'inherit' }}>
                      <span style={{ fontWeight: '500', color: '#4a4a4a' }}>🗺️ Range & Observations</span><span>{expandedSection === 'region' ? '−' : '+'}</span>
                    </button>
                    {expandedSection === 'region' && (
                      <div style={{ padding: '12px 16px', background: '#fafafa', borderRadius: '6px', marginTop: '8px' }}>
                        <p style={{ margin: '0 0 8px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Native Status</p>
                        <p style={{ margin: '0 0 12px 0', fontSize: '0.9rem', color: '#4a4a4a' }}>{currentFlower.nativeStatus}</p>
                        <p style={{ margin: '0 0 8px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>iNaturalist Observations</p>
                        {currentRegional ? (<div style={{ display: 'flex', gap: '16px' }}><div><span style={{ fontSize: '1.5rem', fontWeight: '500', color: '#5c6b4a' }}>{currentRegional.northeastCount.toLocaleString()}</span><p style={{ margin: 0, fontSize: '0.75rem', color: '#888' }}>Northeast US</p></div><div><span style={{ fontSize: '1.5rem', fontWeight: '500', color: '#4a4a4a' }}>{currentRegional.totalCount.toLocaleString()}</span><p style={{ margin: 0, fontSize: '0.75rem', color: '#888' }}>worldwide</p></div></div>) : (<p style={{ color: '#888' }}>Loading...</p>)}
                      </div>
                    )}
                  </div>
                </>
              )}

              {(mode === 'practice' || mode === 'test') && (
                <>
                  {!showAnswer && mode === 'practice' && (
                    showHint ? (
                      <div style={{ background: '#f9f8f5', padding: '16px', borderRadius: '6px', marginBottom: '16px', borderLeft: '3px solid #d4a574' }}>
                        <p style={{ margin: '0 0 4px 0', fontSize: '0.75rem', color: '#888', textTransform: 'uppercase' }}>Hint</p>
                        <p style={{ margin: 0, fontSize: '0.95rem', color: '#4a4a4a', lineHeight: '1.5' }}>{currentFlower.hint}</p>
                      </div>
                    ) : (
                      <button className="hint-reveal-btn" onClick={() => setShowHint(true)}>
                        💡 Tap to reveal hint
                      </button>
                    )
                  )}
                  {!showAnswer && mode === 'test' && (<p style={{ textAlign: 'center', fontSize: '0.9rem', color: '#6b6b6b', marginBottom: '16px' }}>Identify this wildflower</p>)}
                  {!showAnswer ? (
                    <div>
                      <input type="text" value={userGuess} onChange={(e) => setUserGuess(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && checkGuess()} placeholder="Enter flower name..." style={{ width: '100%', padding: '12px 16px', fontSize: '1rem', fontFamily: 'inherit', border: '2px solid #d4cfc4', borderRadius: '6px', marginBottom: '12px' }} />
                      {feedback && <p style={{ margin: '0 0 12px 0', color: feedback.correct ? '#5c6b4a' : '#b85c5c', fontSize: '0.9rem' }}>{feedback.message}</p>}
                      <div style={{ display: 'flex', gap: '12px' }}>
                        <button onClick={checkGuess} style={{ flex: 1, padding: '12px', background: '#5c6b4a', color: '#fff', border: 'none', borderRadius: '6px', fontSize: '0.9rem', fontFamily: 'inherit', cursor: 'pointer' }}>Check</button>
                        <button onClick={giveUp} style={{ flex: 1, padding: '12px', background: '#d4cfc4', color: '#4a4a4a', border: 'none', borderRadius: '6px', fontSize: '0.9rem', fontFamily: 'inherit', cursor: 'pointer' }}>{mode === 'test' ? 'Give Up' : 'Reveal'}</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ textAlign: 'center', marginBottom: '16px' }}>
                        <h2 style={{ fontSize: '1.8rem', fontWeight: '400', color: '#3d3d3d', margin: '0 0 4px 0' }}>{currentFlower.commonName}</h2>
                        <p style={{ fontSize: '1rem', fontStyle: 'italic', color: '#6b6b6b', margin: '0 0 8px 0' }}>{currentFlower.latinName}</p>
                        <span className="tag family-tag">{currentFlower.family}</span>
                      </div>
                      <p style={{ margin: '0 0 12px 0', fontSize: '0.9rem', color: '#4a4a4a', textAlign: 'center' }}>{currentFlower.habitat} • {currentFlower.season}</p>
                      <ToxicityBadge level={currentFlower.toxicity} note={currentFlower.toxicityNote} />
                      <LookalikeWarning text={currentFlower.lookalikes} />
                    </div>
                  )}
                </>
              )}

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '24px', paddingTop: '20px', borderTop: '1px solid #e8e4d9' }}>
                <button onClick={prevFlower} style={{ padding: '10px 20px', background: 'transparent', border: '1px solid #d4cfc4', borderRadius: '4px', fontSize: '0.85rem', fontFamily: 'inherit', cursor: 'pointer', color: '#4a4a4a' }}>← Prev</button>
                <span style={{ fontSize: '0.85rem', color: '#6b6b6b' }}>{currentIndex + 1} / {displayOrder.length}</span>
                <button onClick={nextFlower} style={{ padding: '10px 20px', background: 'transparent', border: '1px solid #d4cfc4', borderRadius: '4px', fontSize: '0.85rem', fontFamily: 'inherit', cursor: 'pointer', color: '#4a4a4a' }}>Next →</button>
              </div>
            </div>
          </div>

          <footer style={{ textAlign: 'center', marginTop: '32px', padding: '16px', color: '#888', fontSize: '0.75rem' }}>
            <p style={{ margin: '0 0 8px 0' }}>Photos from <a href="https://www.inaturalist.org" target="_blank" style={{ color: '#5c6b4a' }}>iNaturalist</a> • Research-grade observations</p>
            <p style={{ margin: 0 }}>Species from <a href="https://www.nycgovparks.org/learn/trees-and-plants/native-plants-of-new-york-city-spring-ephemerals" target="_blank" style={{ color: '#5c6b4a' }}>NYC Parks</a> native plant guides</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
